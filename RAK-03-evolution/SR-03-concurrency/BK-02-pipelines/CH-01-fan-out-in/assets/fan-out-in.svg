<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="40" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Arial" font-size="22" font-weight="900">Fan-Out &amp; Fan-In Orchestration</text>
  <text x="300" y="62" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="12" letter-spacing="2">INDUSTRIAL WORKER POOL PIPELINE</text>

  <!-- Job Source -->
  <rect x="30" y="150" width="80" height="100" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2" />
  <text x="70" y="195" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="12" font-weight="bold">Job</text>
  <text x="70" y="215" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="10">Source</text>

  <!-- Job Channel (Pipe) -->
  <rect x="110" y="185" width="100" height="30" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4" />
  <text x="160" y="205" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="9">jobs chan</text>

  <!-- Fan-Out Area -->
  <path d="M 210 200 L 260 140" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <path d="M 210 200 L 260 200" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <path d="M 210 200 L 260 260" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />

  <!-- Workers -->
  <g transform="translate(270, 110)">
    <rect width="100" height="50" rx="6" fill="#1e293b" stroke="#10b981" />
    <text x="50" y="30" text-anchor="middle" fill="#34d399" font-family="Segoe UI" font-size="11" font-weight="bold">Worker 1</text>
  </g>
  <g transform="translate(270, 175)">
    <rect width="100" height="50" rx="6" fill="#1e293b" stroke="#10b981" />
    <text x="50" y="30" text-anchor="middle" fill="#34d399" font-family="Segoe UI" font-size="11" font-weight="bold">Worker 2</text>
  </g>
  <g transform="translate(270, 240)">
    <rect width="100" height="50" rx="6" fill="#1e293b" stroke="#10b981" />
    <text x="50" y="30" text-anchor="middle" fill="#34d399" font-family="Segoe UI" font-size="11" font-weight="bold">Worker 3</text>
  </g>

  <!-- Fan-In Area -->
  <path d="M 370 135 L 420 200" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />
  <path d="M 370 200 L 420 200" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />
  <path d="M 370 265 L 420 200" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />

  <!-- Final Consumer -->
  <rect x="430" y="160" width="140" height="80" rx="8" fill="url(#grad-blue)" filter="url(#glow)" />
  <text x="500" y="200" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="14" font-weight="bold">Consolidator</text>
  <text x="500" y="220" text-anchor="middle" fill="#bfdbfe" font-family="Segoe UI" font-size="9">Final Output Stream</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
  </defs>

  <!-- Labels -->
  <text x="210" y="120" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="10" font-weight="bold">FAN-OUT</text>
  <text x="400" y="120" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="10" font-weight="bold">FAN-IN</text>
</svg>
