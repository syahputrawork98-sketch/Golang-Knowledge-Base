<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad-center" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:0" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  <circle cx="300" cy="200" r="150" fill="url(#grad-center)" />

  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Tahoma" font-size="22" font-weight="900">Lazy Generator Architecture</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">ON-DEMAND DATA STREAMING</text>

  <!-- Generator Unit -->
  <g transform="translate(60, 130)">
    <rect width="180" height="180" rx="12" fill="#0f172a" stroke="#10b981" stroke-width="2" filter="url(#glow)" />
    <text x="90" y="30" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="14" font-weight="bold">GENERATOR</text>
    
    <!-- State -->
    <rect x="20" y="50" width="140" height="110" rx="8" fill="#1e293b" />
    <text x="90" y="75" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="11" font-weight="bold">Internal State</text>
    <text x="30" y="100" fill="#34d399" font-family="monospace" font-size="12">val_a: 8</text>
    <text x="30" y="125" fill="#34d399" font-family="monospace" font-size="12">val_b: 13</text>
    <text x="30" y="150" fill="#34d399" font-family="monospace" font-size="8">Iterative Calculation...</text>
  </g>

  <!-- Output Channel -->
  <g transform="translate(260, 190)">
    <rect width="80" height="40" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4" />
    <text x="40" y="25" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="10">chan int</text>
  </g>

  <!-- Consumer Unit -->
  <g transform="translate(360, 130)">
    <rect width="180" height="180" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="2" filter="url(#glow)" />
    <text x="90" y="30" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="14" font-weight="bold">CONSUMER</text>
    
    <rect x="25" y="60" width="130" height="90" rx="8" fill="#1e293b" />
    <text x="90" y="85" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="10">Processing...</text>
    <text x="90" y="120" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="14" font-weight="bold">for v := range</text>
  </g>

  <!-- Interaction Lines -->
  <!-- Send -->
  <path d="M 240 210 L 260 210" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />
  <text x="250" y="180" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="9" font-weight="bold" transform="rotate(-90, 250, 180)">PUSH</text>
  
  <!-- Recv -->
  <path d="M 340 210 L 360 210" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <text x="350" y="180" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="9" font-weight="bold" transform="rotate(-90, 350, 180)">PULL</text>

  <!-- Cancellation -->
  <path d="M 360 140 Q 300 100 60 140" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="8,4" marker-end="url(#arrow-red)" />
  <text x="300" y="110" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="10" font-weight="bold">DONE / CONTEXT CANCEL</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
  </defs>
</svg>
