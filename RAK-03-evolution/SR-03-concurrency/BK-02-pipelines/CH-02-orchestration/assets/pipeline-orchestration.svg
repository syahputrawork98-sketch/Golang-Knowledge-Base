<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="40" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Arial" font-size="22" font-weight="900">Pipeline Orchestration Lifecycle</text>
  <text x="300" y="62" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="12" letter-spacing="2">CONTEXT PROPAGATION &amp; TERMINATION</text>

  <!-- Horizontal Context Bar -->
  <rect x="50" y="280" width="500" height="40" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="2" />
  <text x="300" y="305" text-anchor="middle" fill="#818cf8" font-family="Segoe UI" font-size="14" font-weight="bold">Shared Context Management (ctx.Done)</text>

  <!-- Stages -->
  <!-- Stage 1 -->
  <rect x="50" y="120" width="120" height="100" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="2" />
  <text x="110" y="150" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="12" font-weight="bold">STAGE 1</text>
  <text x="110" y="175" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="14" font-weight="bold">Generator</text>
  <path d="M 110 220 L 110 280" stroke="#6366f1" stroke-width="1" stroke-dasharray="4" marker-end="url(#arrow-purple)" />

  <!-- Stage 2 -->
  <rect x="240" y="120" width="120" height="100" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="2" />
  <text x="300" y="150" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="12" font-weight="bold">STAGE 2</text>
  <text x="300" y="175" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="14" font-weight="bold">Processor</text>
  <path d="M 300 220 L 300 280" stroke="#6366f1" stroke-width="1" stroke-dasharray="4" marker-end="url(#arrow-purple)" />

  <!-- Stage 3 -->
  <rect x="430" y="120" width="120" height="100" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="2" />
  <text x="490" y="150" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="12" font-weight="bold">STAGE 3</text>
  <text x="490" y="175" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="14" font-weight="bold">Consumer</text>
  <path d="M 490 220 L 490 280" stroke="#6366f1" stroke-width="1" stroke-dasharray="4" marker-end="url(#arrow-purple)" />

  <!-- Data Flow -->
  <path d="M 170 170 L 240 170" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />
  <path d="M 360 170 L 430 170" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />

  <!-- Termination Event -->
  <g transform="translate(10, 310)">
    <circle cx="0" cy="0" r="30" fill="url(#grad-red)" filter="url(#glow-red)" />
    <text x="0" y="5" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="10" font-weight="bold">CANCEL</text>
    <animate attributeName="transform" type="translate" from="10, 310" to="500, 310" dur="4s" repeatCount="indefinite" />
  </g>

  <!-- Markers -->
  <defs>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6366f1" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
  </defs>

  <!-- Legend -->
  <text x="300" y="350" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="10" font-weight="bold">Green: Continuous Data Flow</text>
  <text x="300" y="370" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="10" font-weight="bold">Red: Instant Termination Signal Propagation</text>
</svg>
