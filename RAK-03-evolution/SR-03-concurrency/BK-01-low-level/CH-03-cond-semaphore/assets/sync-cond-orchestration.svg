<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e22ce;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="40" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Arial" font-size="22" font-weight="900">sync.Cond Orchestration</text>
  <text x="300" y="62" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="12" letter-spacing="2">QUEUEING &amp; BROADCAST SIGNALING</text>

  <!-- Wait Queue Area -->
  <rect x="50" y="100" width="300" height="240" rx="12" fill="#0f172a" stroke="#334155" />
  <text x="200" y="125" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="14" font-weight="bold">Wait Queue (Sleeping Gs)</text>

  <!-- Goroutines in Queue -->
  <g transform="translate(80, 150)">
    <circle cx="0" cy="0" r="25" fill="#1e293b" stroke="#475569" stroke-width="2" />
    <text x="0" y="5" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="10" font-weight="bold">G1</text>
  </g>
  <g transform="translate(150, 150)">
    <circle cx="0" cy="0" r="25" fill="#1e293b" stroke="#475569" stroke-width="2" />
    <text x="0" y="5" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="10" font-weight="bold">G2</text>
  </g>
  <g transform="translate(220, 150)">
    <circle cx="0" cy="0" r="25" fill="#1e293b" stroke="#475569" stroke-width="2" />
    <text x="0" y="5" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="10" font-weight="bold">G3</text>
  </g>

  <!-- Broadcast Signal -->
  <g transform="translate(450, 220)">
    <rect width="100" height="100" rx="50" fill="url(#grad-purple)" filter="url(#glow)" />
    <text x="50" y="55" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="14" font-weight="bold">BROADCAST</text>
  </g>

  <!-- Waves of Signal -->
  <circle cx="500" cy="270" r="80" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.3">
    <animate attributeName="r" from="80" to="250" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="0.3" to="0" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Awake Arrows -->
  <path d="M 450 240 Q 300 180 245 155" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow-purple)" />
  <path d="M 450 270 Q 300 270 175 165" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow-purple)" />

  <!-- Mutex Guardian -->
  <rect x="250" y="270" width="80" height="50" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2" />
  <text x="290" y="300" text-anchor="middle" fill="#f59e0b" font-family="Segoe UI" font-size="11" font-weight="bold">MUTEX</text>
  <text x="290" y="345" text-anchor="middle" fill="#f59e0b" font-family="Segoe UI" font-size="8">Must hold to Wait/Signal</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#a855f7" />
    </marker>
  </defs>
</svg>
