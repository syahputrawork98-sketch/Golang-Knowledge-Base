<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Arial" font-size="22" font-weight="900">sync.Pool Architecture</text>
  <text x="300" y="62" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="12" letter-spacing="2">PER-PROCESSOR (P) STORAGE &amp; STEALING</text>

  <!-- P1 Node -->
  <rect x="50" y="100" width="160" height="200" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="1" />
  <text x="130" y="125" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="14" font-weight="bold">Processor P1</text>
  <!-- Private Cache -->
  <rect x="65" y="140" width="130" height="40" rx="6" fill="#1e293b" />
  <text x="130" y="158" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="10" font-weight="bold">PRIVATE</text>
  <circle cx="110" cy="168" r="5" fill="#10b981" />
  <!-- Shared Cache -->
  <rect x="65" y="190" width="130" height="90" rx="6" fill="#1e293b" />
  <text x="130" y="208" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="10" font-weight="bold">SHARED DEQUE</text>
  <rect x="110" y="220" width="40" height="15" fill="#334155" />
  <rect x="110" y="240" width="40" height="15" fill="#334155" />

  <!-- P2 Node -->
  <rect x="390" y="100" width="160" height="200" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1" />
  <text x="470" y="125" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="14" font-weight="bold">Processor P2</text>
  <rect x="405" y="140" width="130" height="40" rx="6" fill="#1e293b" />
  <rect x="405" y="190" width="130" height="90" rx="6" fill="#1e293b" />

  <!-- Victim Cache -->
  <rect x="230" y="320" width="140" height="60" rx="8" fill="#450a0a" stroke="#ef4444" stroke-dasharray="4" />
  <text x="300" y="345" text-anchor="middle" fill="#fca5a5" font-family="Segoe UI" font-size="12" font-weight="bold">Victim Cache</text>
  <text x="300" y="362" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="9">Cleared each GC cycle</text>

  <!-- Interaction Lines -->
  <!-- Stealing -->
  <path d="M 210 240 L 390 240" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow-steal)" />
  <text x="300" y="230" text-anchor="middle" fill="#f59e0b" font-family="Segoe UI" font-size="10" font-weight="bold">WORK STEALING</text>

  <!-- Put/Get G1 -->
  <circle cx="130" cy="350" r="25" fill="#3b82f6" filter="url(#glow)" />
  <text x="130" y="355" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="12" font-weight="bold">G1</text>
  <path d="M 130 325 L 130 300" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />

  <!-- Markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-steal" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
  </defs>
</svg>
