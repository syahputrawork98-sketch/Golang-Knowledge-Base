<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="40" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Arial" font-size="22" font-weight="900">sync.Once Internal State</text>
  <text x="300" y="62" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="12" letter-spacing="2">ATOMIC FAST-PATH &amp; MUTEX SLOW-PATH</text>

  <!-- Goroutines -->
  <g transform="translate(40, 100)">
    <rect width="120" height="240" rx="12" fill="#0f172a" stroke="#334155" />
    <text x="60" y="25" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" font-weight="bold">Goroutines</text>
    
    <path d="M 20 60 L 100 60" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
    <path d="M 20 100 L 100 100" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
    <path d="M 20 140 L 100 140" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
    <text x="60" y="220" text-anchor="middle" fill="#1e293b" font-family="Arial" font-size="10">n-concurrent calls</text>
  </g>

  <!-- Step 1: Atomic Check -->
  <rect x="220" y="140" width="160" height="60" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#glow)" />
  <text x="300" y="165" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="14" font-weight="bold">Atomic.Load(done)</text>
  <text x="300" y="180" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">If 1 -> Return Immediately</text>

  <!-- Step 2: Mutex Lock -->
  <rect x="220" y="240" width="160" height="80" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="2" />
  <text x="300" y="270" text-anchor="middle" fill="#fca5a5" font-family="Segoe UI" font-size="14" font-weight="bold">Mutex.Lock()</text>
  <text x="300" y="285" text-anchor="middle" fill="#991b1b" font-family="Segoe UI" font-size="9">Slow Path: Ensures Serial</text>
  <text x="300" y="300" text-anchor="middle" fill="#dc2626" font-family="Segoe UI" font-size="9">Check done again (Double Check)</text>

  <!-- Final: Execution -->
  <rect x="440" y="160" width="120" height="120" rx="60" fill="url(#grad-blue)" filter="url(#glow)" />
  <text x="500" y="215" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="14" font-weight="bold">f()</text>
  <text x="500" y="235" text-anchor="middle" fill="#bfdbfe" font-family="Segoe UI" font-size="9">Only Runs Once</text>

  <!-- Connections -->
  <path d="M 160 170 L 220 170" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)" />
  <path d="M 300 200 L 300 240" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrow-red)" />
  <path d="M 380 280 L 440 240" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrow-green)" />

  <!-- Markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
