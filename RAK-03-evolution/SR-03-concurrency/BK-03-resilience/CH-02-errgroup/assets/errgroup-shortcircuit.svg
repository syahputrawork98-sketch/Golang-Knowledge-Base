<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="400" fill="#020617" rx="16"/>
  <text x="300" y="42" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI" font-size="22" font-weight="900">errgroup Short-Circuit</text>
  <text x="300" y="64" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">CONCURRENT ERROR PROPAGATION</text>

  <!-- Group Source -->
  <rect x="30" y="155" width="130" height="70" rx="10" fill="#0f172a" stroke="#6366f1" stroke-width="2"/>
  <text x="95" y="185" text-anchor="middle" fill="#818cf8" font-family="Segoe UI" font-size="12" font-weight="bold">errgroup</text>
  <text x="95" y="205" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="10">.WithContext()</text>

  <!-- Goroutine 1 - OK -->
  <rect x="230" y="100" width="140" height="60" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
  <text x="300" y="128" text-anchor="middle" fill="#34d399" font-family="Segoe UI" font-size="12" font-weight="bold">G1: api-a ✓</text>
  <text x="300" y="148" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">return nil</text>

  <!-- Goroutine 2 - FAIL -->
  <rect x="230" y="180" width="140" height="60" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="2" filter="url(#glow)"/>
  <text x="300" y="208" text-anchor="middle" fill="#fca5a5" font-family="Segoe UI" font-size="12" font-weight="bold">G2: api-b ✗</text>
  <text x="300" y="228" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="9">return error</text>

  <!-- Goroutine 3 - cancelled -->
  <rect x="230" y="260" width="140" height="60" rx="8" fill="#0f172a" stroke="#475569" stroke-width="2"/>
  <text x="300" y="288" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="12" font-weight="bold">G3: api-c</text>
  <text x="300" y="308" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="9">ctx cancelled →stop</text>

  <!-- Wait Result -->
  <rect x="430" y="155" width="140" height="70" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="500" y="185" text-anchor="middle" fill="#fca5a5" font-family="Segoe UI" font-size="13" font-weight="bold">g.Wait()</text>
  <text x="500" y="205" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="10">returns first error</text>

  <!-- Fan-out arrows -->
  <path d="M 160 190 Q 195 130 230 130" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#ap)"/>
  <path d="M 160 190 L 230 210" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#ap)"/>
  <path d="M 160 190 Q 195 260 230 290" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#ap)"/>

  <!-- Error propagation -->
  <path d="M 370 210 L 430 190" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#ar)"/>

  <!-- Cancel dashes -->
  <path d="M 430 190 Q 390 130 370 130" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#ar)"/>
  <path d="M 430 210 Q 390 290 370 290" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#ar)"/>

  <defs>
    <marker id="ap" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#6366f1"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
