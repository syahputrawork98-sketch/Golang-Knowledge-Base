<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Arial" font-size="22" font-weight="900">Token Bucket Mechanism</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">REFILL RATE &amp; BURST CAPACITY</text>

  <!-- Refill Engine -->
  <rect x="50" y="100" width="160" height="80" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="2" />
  <text x="130" y="135" text-anchor="middle" fill="#f59e0b" font-family="Segoe UI" font-size="14" font-weight="bold">Refill Engine</text>
  <text x="130" y="155" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="10">+r tokens / second</text>

  <!-- Bucket -->
  <path d="M 250 150 L 350 150 L 330 350 L 270 350 Z" fill="#1e293b" stroke="#94a3b8" stroke-width="2" />
  <text x="300" y="140" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="12" font-weight="bold">Bucket (Burst b)</text>

  <!-- Tokens inside -->
  <circle cx="300" cy="330" r="12" fill="url(#grad-gold)" filter="url(#glow)" />
  <circle cx="320" cy="310" r="12" fill="url(#grad-gold)" filter="url(#glow)" />
  <circle cx="280" cy="310" r="12" fill="url(#grad-gold)" filter="url(#glow)" />
  <circle cx="300" cy="290" r="12" fill="url(#grad-gold)" filter="url(#glow)" />

  <!-- Request Flow -->
  <g transform="translate(450, 200)">
    <rect width="100" height="60" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2" />
    <text x="50" y="35" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="12" font-weight="bold">Request</text>
  </g>
  <path d="M 450 230 L 350 230" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <text x="400" y="220" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="10">Needs 1</text>

  <!-- Token Consumption -->
  <path d="M 300 180 L 210 140" stroke="#f59e0b" stroke-width="2" marker-start="url(#dot-gold)" />

  <!-- Rejection Flow -->
  <path d="M 450 240 Q 550 300 500 350" stroke="#ef4444" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow-red)" />
  <text x="540" y="320" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="10" font-weight="bold">REJECT (429)</text>

  <!-- Success Flow -->
  <path d="M 270 330 L 100 330" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />
  <text x="185" y="320" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="10" font-weight="bold">PROCESS</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
    <marker id="dot-gold" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="3" fill="#f59e0b" />
    </marker>
  </defs>
</svg>
