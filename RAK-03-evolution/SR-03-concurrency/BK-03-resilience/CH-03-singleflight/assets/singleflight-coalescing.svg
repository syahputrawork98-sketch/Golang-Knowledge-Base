<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="400" fill="#020617" rx="16"/>
  <text x="300" y="42" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI" font-size="22" font-weight="900">Singleflight: Request Coalescing</text>
  <text x="300" y="64" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">CACHE STAMPEDE PREVENTION</text>

  <!-- Incoming Requests (left side) -->
  <g>
    <rect x="20" y="90" width="110" height="36" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="75" y="114" text-anchor="middle" fill="#93c5fd" font-family="Segoe UI" font-size="11">Request: user-1</text>
  </g>
  <g>
    <rect x="20" y="140" width="110" height="36" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="75" y="164" text-anchor="middle" fill="#93c5fd" font-family="Segoe UI" font-size="11">Request: user-1</text>
  </g>
  <g>
    <rect x="20" y="190" width="110" height="36" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="75" y="214" text-anchor="middle" fill="#93c5fd" font-family="Segoe UI" font-size="11">Request: user-1</text>
  </g>
  <text x="75" y="250" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="11">... 47 more</text>

  <!-- Singleflight Hub -->
  <rect x="200" y="140" width="160" height="100" rx="12" fill="url(#grad-green)" filter="url(#glow)"/>
  <text x="280" y="183" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="15" font-weight="900">singleflight</text>
  <text x="280" y="202" text-anchor="middle" fill="#d1fae5" font-family="Segoe UI" font-size="10">g.Do("user-1", fn)</text>
  <text x="280" y="220" text-anchor="middle" fill="#6ee7b7" font-family="Segoe UI" font-size="9">Coalesces duplicates</text>

  <!-- Single DB Call -->
  <rect x="430" y="160" width="130" height="70" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="2.5"/>
  <text x="495" y="193" text-anchor="middle" fill="#34d399" font-family="Segoe UI" font-size="13" font-weight="bold">Database</text>
  <text x="495" y="213" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="9">Called 1x only</text>

  <!-- Arrows: requests to hub -->
  <path d="M 130 108 L 200 175" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#ab)"/>
  <path d="M 130 158 L 200 190" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#ab)"/>
  <path d="M 130 208 L 200 210" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#ab)"/>

  <!-- Arrow to DB -->
  <path d="M 360 190 L 430 190" stroke="#10b981" stroke-width="2.5" fill="none" marker-end="url(#ag)"/>
  <text x="395" y="183" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="9" font-weight="bold">1 call</text>

  <!-- Shared result back -->
  <path d="M 430 215 Q 280 310 130 260" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#ay)"/>
  <text x="280" y="340" text-anchor="middle" fill="#f59e0b" font-family="Segoe UI" font-size="11" font-weight="bold">Shared Result → all 50 goroutines</text>

  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#10b981"/>
    </marker>
    <marker id="ay" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
