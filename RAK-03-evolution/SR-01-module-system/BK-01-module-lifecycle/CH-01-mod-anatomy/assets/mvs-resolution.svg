<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#0f172a" rx="12" />
  
  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Minimal Version Selection (MVS)</text>
  <text x="300" y="65" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">How Go resolves dependency version conflicts</text>

  <!-- Nodes -->
  <!-- App Root -->
  <rect x="250" y="100" width="100" height="50" rx="8" fill="#3b82f6" />
  <text x="300" y="130" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Your App</text>

  <!-- Level 1 Dependencies -->
  <rect x="100" y="200" width="120" height="50" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2" />
  <text x="160" y="230" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12">Lib-A (v1.2.0)</text>

  <rect x="380" y="200" width="120" height="50" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2" />
  <text x="440" y="230" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12">Lib-B (v1.0.0)</text>

  <!-- Level 2 Dependencies (Transitive) -->
  <rect x="250" y="300" width="120" height="50" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2" />
  <text x="310" y="320" text-anchor="middle" fill="#fef3c7" font-family="Arial, sans-serif" font-size="12">Lib-X (v1.1.0)</text>
  <text x="310" y="340" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Required by Lib-B</text>

  <!-- Conflict Node -->
  <circle cx="160" cy="325" r="25" fill="#ef4444" opacity="0.2" />
  <text x="160" y="330" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="10" font-weight="bold">CONFLICT</text>

  <!-- Selected Node -->
  <rect x="100" y="300" width="120" height="50" rx="8" fill="#059669" stroke="#10b981" stroke-width="2" />
  <text x="160" y="320" text-anchor="middle" fill="#ecfdf5" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Lib-X (v1.2.0)</text>
  <text x="160" y="340" text-anchor="middle" fill="#d1fae5" font-family="Arial, sans-serif" font-size="10">Final Selected</text>

  <!-- Connections -->
  <path d="M 300 150 L 160 200" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <path d="M 300 150 L 440 200" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <path d="M 160 250 L 160 300" stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#arrow-green)" />
  <path d="M 440 250 L 310 300" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <path d="M 310 325 L 220 325" stroke="#ef4444" stroke-dasharray="4" stroke-width="2" fill="none" marker-end="url(#arrow-red)" />

  <!-- Markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
  </defs>

  <!-- Decision Box -->
  <rect x="400" y="280" width="180" height="90" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-dasharray="2" />
  <text x="410" y="300" fill="#f8fafc" font-family="Arial, sans-serif" font-size="11" font-weight="bold">MVS Decision Logic:</text>
  <text x="410" y="320" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">1. Build requirement graph.</text>
  <text x="410" y="335" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">2. Find highest version of each module.</text>
  <text x="410" y="350" fill="#10b981" font-family="Arial, sans-serif" font-size="10" font-weight="bold">3. Select v1.2.0 (The 'oldest'</text>
  <text x="410" y="362" fill="#10b981" font-family="Arial, sans-serif" font-size="10" font-weight="bold">   reachable version).</text>
</svg>
