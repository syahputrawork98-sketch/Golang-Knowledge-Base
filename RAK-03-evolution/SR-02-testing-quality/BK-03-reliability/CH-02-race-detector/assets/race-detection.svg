<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow-r" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="400" fill="#020617" rx="16"/>
  <text x="300" y="42" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI" font-size="22" font-weight="900">Go Race Detector</text>
  <text x="300" y="64" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">go test -race — MEMORY ACCESS CONFLICT</text>

  <!-- G1 write -->
  <rect x="40" y="130" width="180" height="80" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="130" y="165" text-anchor="middle" fill="#93c5fd" font-family="Segoe UI" font-size="13" font-weight="bold">Goroutine 1</text>
  <text x="130" y="185" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="11">counter++ (WRITE)</text>

  <!-- G2 read -->
  <rect x="380" y="130" width="180" height="80" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
  <text x="470" y="165" text-anchor="middle" fill="#34d399" font-family="Segoe UI" font-size="13" font-weight="bold">Goroutine 2</text>
  <text x="470" y="185" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="11">val = counter (READ)</text>

  <!-- Shared variable -->
  <rect x="230" y="220" width="140" height="50" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="300" y="250" text-anchor="middle" fill="#fde68a" font-family="monospace" font-size="14" font-weight="bold">var counter int</text>

  <!-- Race explosion -->
  <circle cx="300" cy="310" r="45" fill="url(#grad-red)" filter="url(#glow-r)" opacity="0.9"/>
  <text x="300" y="305" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="12" font-weight="bold">DATA</text>
  <text x="300" y="325" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="12" font-weight="bold">RACE!</text>

  <!-- Arrows to shared var -->
  <path d="M 200 170 Q 260 170 260 220" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#ab)"/>
  <path d="M 400 170 Q 340 170 340 220" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#ag)"/>

  <!-- Arrows to race -->
  <path d="M 280 270 L 280 295" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#ar)"/>

  <!-- TSAN badge -->
  <rect x="30" y="300" width="140" height="55" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="100" y="326" text-anchor="middle" fill="#818cf8" font-family="Segoe UI" font-size="12" font-weight="bold">-race flag</text>
  <text x="100" y="344" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="9">ThreadSanitizer (TSAN)</text>

  <!-- Report badge -->
  <rect x="430" y="300" width="140" height="55" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="500" y="326" text-anchor="middle" fill="#fca5a5" font-family="Segoe UI" font-size="12" font-weight="bold">Race Report</text>
  <text x="500" y="344" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="9">Stack trace + goroutine IDs</text>

  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#10b981"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
