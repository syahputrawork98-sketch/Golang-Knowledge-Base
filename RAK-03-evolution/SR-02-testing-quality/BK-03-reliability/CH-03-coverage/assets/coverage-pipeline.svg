<svg width="600" height="380" viewBox="0 0 600 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="380" fill="#020617" rx="16"/>
  <text x="300" y="42" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI" font-size="22" font-weight="900">Coverage Analysis Pipeline</text>
  <text x="300" y="64" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">go test -cover → HTML REPORT</text>

  <!-- Stage 1: Source Code -->
  <rect x="20" y="130" width="110" height="100" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="75" y="160" text-anchor="middle" fill="#60a5fa" font-family="Segoe UI" font-size="11" font-weight="bold">Source</text>
  <text x="75" y="178" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="10">main.go</text>
  <!-- Lines -->
  <rect x="35" y="190" width="80" height="8" rx="2" fill="#1e3a5f"/>
  <rect x="35" y="202" width="60" height="8" rx="2" fill="#1e3a5f"/>
  <rect x="35" y="214" width="80" height="8" rx="2" fill="#1e3a5f"/>

  <!-- Arrow 1 -->
  <path d="M 130 180 L 170 180" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#ab)"/>
  <text x="150" y="170" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="8">-cover</text>

  <!-- Stage 2: Instrumented -->
  <rect x="170" y="130" width="120" height="100" rx="8" fill="#0f172a" stroke="#6366f1" stroke-width="2"/>
  <text x="230" y="158" text-anchor="middle" fill="#818cf8" font-family="Segoe UI" font-size="11" font-weight="bold">Instrumented</text>
  <text x="230" y="175" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="9">Counters injected</text>
  <!-- Instrumented lines -->
  <rect x="185" y="190" width="90" height="8" rx="2" fill="#14532d"/>
  <rect x="185" y="202" width="70" height="8" rx="2" fill="#14532d"/>
  <rect x="185" y="214" width="90" height="8" rx="2" fill="#7f1d1d"/>

  <!-- Arrow 2 -->
  <path d="M 290 180 L 330 180" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#ap)"/>
  <text x="310" y="170" text-anchor="middle" fill="#818cf8" font-family="monospace" font-size="8">-coverprofile</text>

  <!-- Stage 3: Profile -->
  <rect x="330" y="130" width="110" height="100" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <text x="385" y="158" text-anchor="middle" fill="#fcd34d" font-family="Segoe UI" font-size="11" font-weight="bold">c.out</text>
  <text x="385" y="175" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="9">Raw profile data</text>
  <text x="385" y="205" text-anchor="middle" fill="#475569" font-family="monospace" font-size="8">main.go:12.1,14.5 3 1</text>
  <text x="385" y="220" text-anchor="middle" fill="#475569" font-family="monospace" font-size="8">main.go:18.1,20.2 1 0</text>

  <!-- Arrow 3 -->
  <path d="M 440 180 L 475 180" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#ay)"/>
  <text x="457" y="170" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="8">go tool cover</text>

  <!-- Stage 4: HTML Report -->
  <rect x="475" y="110" width="105" height="140" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
  <text x="527" y="140" text-anchor="middle" fill="#34d399" font-family="Segoe UI" font-size="11" font-weight="bold">HTML</text>
  <text x="527" y="157" text-anchor="middle" fill="#34d399" font-family="Segoe UI" font-size="11" font-weight="bold">Report</text>
  <!-- Color bars representing covered/uncovered -->
  <rect x="488" y="170" width="75" height="12" rx="2" fill="#14532d"/>
  <text x="525" y="181" text-anchor="middle" fill="#6ee7b7" font-family="Segoe UI" font-size="8">Covered</text>
  <rect x="488" y="188" width="75" height="12" rx="2" fill="#7f1d1d"/>
  <text x="525" y="199" text-anchor="middle" fill="#fca5a5" font-family="Segoe UI" font-size="8">Not Covered</text>
  <rect x="488" y="206" width="75" height="12" rx="2" fill="#14532d"/>
  <text x="525" y="217" text-anchor="middle" fill="#6ee7b7" font-family="Segoe UI" font-size="8">Covered</text>

  <!-- Coverage % -->
  <rect x="190" y="280" width="220" height="60" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
  <text x="300" y="308" text-anchor="middle" fill="#34d399" font-family="Segoe UI" font-size="20" font-weight="900">84.6%</text>
  <text x="300" y="330" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="10">coverage: of statements in ./...</text>

  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="ap" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#6366f1"/>
    </marker>
    <marker id="ay" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
