<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="400" fill="#020617" rx="16"/>
  <text x="300" y="42" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI" font-size="22" font-weight="900">Test Lifecycle Architecture</text>
  <text x="300" y="64" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">TestMain · t.Helper · t.Cleanup</text>

  <!-- go test entry -->
  <rect x="230" y="90" width="140" height="50" rx="8" fill="url(#grad-blue)" filter="url(#glow)"/>
  <text x="300" y="121" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="14" font-weight="bold">go test ./...</text>

  <!-- TestMain block -->
  <rect x="80" y="180" width="180" height="70" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <text x="170" y="208" text-anchor="middle" fill="#fcd34d" font-family="Segoe UI" font-size="13" font-weight="bold">TestMain(m)</text>
  <text x="170" y="228" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">Global Setup → m.Run() → Teardown</text>
  <text x="170" y="242" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="8">e.g. Start Postgres container</text>

  <!-- Per-test block -->
  <rect x="340" y="175" width="210" height="150" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
  <text x="445" y="200" text-anchor="middle" fill="#34d399" font-family="Segoe UI" font-size="12" font-weight="bold">Per Test Function</text>

  <!-- t.Helper badge -->
  <rect x="358" y="215" width="175" height="30" rx="5" fill="#1e293b"/>
  <circle cx="375" cy="230" r="8" fill="#3b82f6"/>
  <text x="378" y="234" fill="#3b82f6" font-family="monospace" font-size="9" font-weight="bold">H</text>
  <text x="392" y="234" fill="#94a3b8" font-family="Segoe UI" font-size="10">t.Helper(): Fix error lines</text>

  <!-- t.Cleanup badge -->
  <rect x="358" y="255" width="175" height="30" rx="5" fill="#1e293b"/>
  <circle cx="375" cy="270" r="8" fill="#ef4444"/>
  <text x="372" y="274" fill="white" font-family="monospace" font-size="8" font-weight="bold">↩</text>
  <text x="392" y="274" fill="#94a3b8" font-family="Segoe UI" font-size="10">t.Cleanup(): LIFO teardown</text>

  <!-- Execution badge -->
  <rect x="358" y="295" width="175" height="24" rx="5" fill="#1e293b"/>
  <text x="445" y="311" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="9">Test Logic Execution</text>

  <!-- Arrows -->
  <path d="M 300 140 L 200 180" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#ay)"/>
  <path d="M 300 140 L 410 175" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#ag)"/>
  <path d="M 260 250 L 340 250" stroke="#475569" stroke-width="1" stroke-dasharray="4" fill="none" marker-end="url(#ag)"/>

  <!-- Exit code -->
  <rect x="220" y="340" width="160" height="40" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="300" y="365" text-anchor="middle" fill="#818cf8" font-family="Segoe UI" font-size="13" font-weight="bold">Exit Code (os.Exit)</text>
  <path d="M 170 250 L 170 360 L 220 360" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="4" marker-end="url(#ay)"/>

  <defs>
    <marker id="ay" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#10b981"/>
    </marker>
  </defs>
</svg>
