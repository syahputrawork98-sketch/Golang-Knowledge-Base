<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#0f172a" rx="12" />
  
  <!-- Title -->
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Table-Driven Test Expansion</text>
  <text x="300" y="70" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">From a single Slice to Parallel Sub-tests</text>

  <!-- Input Table -->
  <rect x="50" y="120" width="150" height="200" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2" />
  <text x="125" y="145" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">[]struct{...}</text>
  
  <!-- Rows -->
  <rect x="60" y="160" width="130" height="30" rx="4" fill="#334155" />
  <text x="125" y="180" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">{"case 1", 10}</text>
  
  <rect x="60" y="200" width="130" height="30" rx="4" fill="#334155" />
  <text x="125" y="220" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">{"case 2", 20}</text>
  
  <rect x="60" y="240" width="130" height="30" rx="4" fill="#334155" />
  <text x="125" y="260" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">{"case 3", 30}</text>

  <!-- Fan-out Arrows -->
  <path d="M 200 175 C 250 175 250 150 350 150" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)" />
  <path d="M 200 215 L 350 215" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)" />
  <path d="M 200 255 C 250 255 250 280 350 280" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)" />

  <!-- Sub-tests -->
  <g transform="translate(360, 125)">
    <rect width="180" height="50" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="2" />
    <text x="90" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">t.Run("case 1")</text>
    <text x="90" y="42" text-anchor="middle" fill="#34d399" font-family="Arial, sans-serif" font-size="10">GOMAXPROCS Parallel</text>
  </g>

  <g transform="translate(360, 190)">
    <rect width="180" height="50" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="2" />
    <text x="90" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">t.Run("case 2")</text>
    <text x="90" y="42" text-anchor="middle" fill="#34d399" font-family="Arial, sans-serif" font-size="10">GOMAXPROCS Parallel</text>
  </g>

  <g transform="translate(360, 255)">
    <rect width="180" height="50" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="2" />
    <text x="90" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">t.Run("case 3")</text>
    <text x="90" y="42" text-anchor="middle" fill="#34d399" font-family="Arial, sans-serif" font-size="10">GOMAXPROCS Parallel</text>
  </g>

  <!-- Loop Explanation -->
  <text x="125" y="340" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="11" font-style="italic">for _, tt := range tests { ... }</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
  </defs>
</svg>
