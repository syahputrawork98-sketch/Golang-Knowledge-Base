<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  <path d="M 0 100 Q 300 150 600 100" stroke="#1e293b" fill="none" opacity="0.5" />
  <path d="M 0 300 Q 300 250 600 300" stroke="#1e293b" fill="none" opacity="0.5" />

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Arial" font-size="22" font-weight="900">TESTCONTAINERS ORCHESTRATION</text>
  <text x="300" y="62" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Arial" font-size="12" letter-spacing="2">EPHEMERAL INFRASTRUCTURE LIFECYCLE</text>

  <!-- Go Test Runtime -->
  <rect x="40" y="140" width="130" height="160" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="2" filter="url(#glow)" />
  <text x="105" y="210" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI" font-size="16" font-weight="bold">Go Runtime</text>
  <rect x="55" y="230" width="100" height="20" rx="4" fill="#1e293b" />
  <text x="105" y="244" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="9">go test -v</text>

  <!-- Docker Engine -->
  <rect x="360" y="100" width="200" height="260" rx="16" fill="#0f172a" stroke="#334155" stroke-width="1" />
  <text x="460" y="130" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" font-weight="bold">DOCKER ENGINE</text>

  <!-- Ryuk (The Reaper) -->
  <rect x="380" y="150" width="160" height="40" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1" />
  <text x="460" y="175" text-anchor="middle" fill="#fecaca" font-family="Segoe UI" font-size="11" font-weight="bold">Reaper (Ryuk / Moby)</text>
  <text x="460" y="185" text-anchor="middle" fill="#991b1b" font-family="Segoe UI" font-size="7">Auto-cleanup orphaned containers</text>

  <!-- Main Container -->
  <rect x="380" y="210" width="160" height="110" rx="8" fill="url(#grad-green)" filter="url(#glow)" />
  <text x="460" y="245" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="16" font-weight="bold">PostgreSQL</text>
  <text x="460" y="265" text-anchor="middle" fill="#d1fae5" font-family="Segoe UI" font-size="9">IMAGE: postgres:16-alpine</text>
  
  <rect x="390" y="280" width="140" height="30" rx="4" fill="#064e3b" />
  <text x="460" y="299" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="10" font-weight="bold">PORT: 49153 : 5432</text>

  <!-- Communication Paths -->
  <!-- 1. GRPC/REST Call -->
  <path d="M 170 180 L 350 180" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4" fill="none" marker-end="url(#arrow-blue)" />
  <text x="260" y="175" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="10" font-weight="bold">1. gRPC: Create Container</text>
  
  <!-- 2. Wait Strategy -->
  <path d="M 380 260 L 170 260" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrow-green)" />
  <text x="265" y="255" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="10" font-weight="bold">2. LOG_WATCH: "Ready"</text>

  <!-- 3. Query -->
  <path d="M 170 280 Q 275 310 380 280" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrow-orange)" />
  <text x="275" y="325" text-anchor="middle" fill="#f59e0b" font-family="Segoe UI" font-size="10" font-weight="bold">3. SQL: Execute Operations</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
  </defs>
</svg>
