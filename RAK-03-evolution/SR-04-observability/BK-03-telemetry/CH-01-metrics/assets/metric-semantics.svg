<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Tahoma" font-size="22" font-weight="900">Modern Telemetry Semantics</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">RUNTIME/METRICS DATA MODELS</text>

  <!-- 1. Counter -->
  <g transform="translate(50, 100)">
    <rect width="150" height="240" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="2" />
    <text x="75" y="30" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="14" font-weight="bold">Counter</text>
    <text x="75" y="50" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="9">Always Increases</text>
    
    <!-- Graph -->
    <path d="M 20 200 L 40 180 L 70 150 L 100 120 L 130 90" stroke="#10b981" stroke-width="2" fill="none" />
    <circle cx="130" cy="90" r="4" fill="#10b981" filter="url(#glow)" />
    
    <text x="75" y="225" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">Total Allocs</text>
    <text x="75" y="235" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">GC Cycles</text>
  </g>

  <!-- 2. Gauge -->
  <g transform="translate(225, 100)">
    <rect width="150" height="240" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="2" />
    <text x="75" y="30" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="14" font-weight="bold">Gauge</text>
    <text x="75" y="50" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="9">Instantaneous Value</text>
    
    <!-- Graph -->
    <path d="M 20 150 Q 50 80 80 180 T 130 140" stroke="#3b82f6" stroke-width="2" fill="none" />
    <circle cx="130" cy="140" r="4" fill="#3b82f6" filter="url(#glow)" />
    
    <text x="75" y="225" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">Active Goroutines</text>
    <text x="75" y="235" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">Heap In-use</text>
  </g>

  <!-- 3. Histogram -->
  <g transform="translate(400, 100)">
    <rect width="150" height="240" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2" />
    <text x="75" y="30" text-anchor="middle" fill="#f59e0b" font-family="Segoe UI" font-size="14" font-weight="bold">Histogram</text>
    <text x="75" y="50" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="9">Distribution/Bins</text>
    
    <!-- Bars -->
    <rect x="25" y="160" width="20" height="40" fill="#f59e0b" opacity="0.4" />
    <rect x="50" y="120" width="20" height="80" fill="#f59e0b" opacity="0.7" />
    <rect x="75" y="140" width="20" height="60" fill="#f59e0b" opacity="0.9" filter="url(#glow)" />
    <rect x="100" y="170" width="20" height="30" fill="#f59e0b" opacity="0.5" />
    
    <text x="75" y="225" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">GC Pause Latency</text>
    <text x="75" y="235" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">Request Latency</text>
  </g>
</svg>
