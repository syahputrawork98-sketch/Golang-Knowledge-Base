<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Tahoma" font-size="22" font-weight="900">Prometheus Pull Model Architecture</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">INDUSTRIAL MONITORING &amp; SCRAPING</text>

  <!-- Go App Section -->
  <g transform="translate(50, 120)">
    <rect width="200" height="200" rx="12" fill="#0f172a" stroke="#2dd4bf" stroke-width="2" filter="url(#glow)" />
    <text x="100" y="30" text-anchor="middle" fill="#2dd4bf" font-family="Segoe UI" font-size="14" font-weight="bold">GO APPLICATION</text>
    
    <!-- Internal Registry -->
    <rect x="30" y="50" width="140" height="80" rx="6" fill="#1e293b" />
    <text x="100" y="70" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="10">Global Registry</text>
    <path d="M 50 85 L 150 85 M 50 100 L 130 100" stroke="#2dd4bf" stroke-width="2" opacity="0.6" />
    
    <!-- HTTP Endpoint -->
    <rect x="130" y="140" width="80" height="40" rx="4" fill="#0d9488" />
    <text x="170" y="165" text-anchor="middle" fill="white" font-family="monospace" font-size="10">/metrics</text>
    <circle cx="210" cy="160" r="10" fill="#2dd4bf" opacity="0.4">
      <animate attributeName="r" values="8;15;8" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Prometheus Server -->
  <g transform="translate(350, 120)">
    <rect width="180" height="200" rx="12" fill="#0f172a" stroke="#f97316" stroke-width="2" />
    <text x="90" y="30" text-anchor="middle" fill="#f97316" font-family="Segoe UI" font-size="14" font-weight="bold">PROMETHEUS SERVER</text>
    
    <!-- Scraper Logic -->
    <rect x="25" y="60" width="130" height="110" rx="8" fill="#431407" />
    <text x="90" y="85" text-anchor="middle" fill="#fcd34d" font-family="Segoe UI" font-size="10" font-weight="bold">SCRAPER</text>
    
    <path d="M 40 100 L 60 140 L 80 90 L 110 150 L 140 120" stroke="#f97316" stroke-width="2" fill="none" />
    <text x="90" y="190" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">Time-Series DB (TSDB)</text>
  </g>

  <!-- Pull Arrow -->
  <path d="M 350 200 L 220 200" stroke="#f97316" stroke-width="3" marker-end="url(#arrow-orange)" />
  <text x="285" y="190" text-anchor="middle" fill="#f97316" font-family="Segoe UI" font-size="10" font-weight="bold">HTTP PULL (Scrape)</text>
  <text x="285" y="215" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="8">Every 15-60 seconds</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f97316" />
    </marker>
  </defs>
</svg>
