<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Tahoma" font-size="22" font-weight="900">slog Structured Logging Pipeline</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">KEY-VALUE LOGGING &amp; SERIALIZATION</text>

  <!-- Input Section -->
  <g transform="translate(40, 100)">
    <rect width="160" height="220" rx="10" fill="#0f172a" stroke="#6366f1" stroke-width="2" />
    <text x="80" y="25" text-anchor="middle" fill="#6366f1" font-family="Segoe UI" font-size="12" font-weight="bold">LOG CALL</text>
    <rect x="15" y="45" width="130" height="50" rx="4" fill="#1e293b" />
    <text x="25" y="65" fill="#f8fafc" font-family="monospace" font-size="8">logger.Info(</text>
    <text x="35" y="80" fill="#34d399" font-family="monospace" font-size="8">"msg", "user_id", 42</text>
    <text x="25" y="90" fill="#f8fafc" font-family="monospace" font-size="8">)</text>
  </g>

  <!-- Middle Section: Record & Handler -->
  <g transform="translate(240, 100)">
    <rect width="180" height="100" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-dasharray="4" />
    <text x="90" y="20" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="10" font-weight="bold">Internal Record</text>
    <path d="M 40 40 L 140 40 M 40 55 L 120 55 M 40 70 L 150 70" stroke="#6366f1" stroke-width="2" opacity="0.6" />
    
    <rect y="120" width="180" height="100" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="2" filter="url(#glow)" />
    <text x="90" y="145" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="14" font-weight="bold">JSON Handler</text>
    <text x="90" y="165" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="9">(ReplaceAttr Logic)</text>
    <rect x="30" y="180" width="120" height="20" rx="4" fill="#14532d" />
    <text x="90" y="193" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="8">Serialize to JSON</text>
  </g>

  <!-- Output Section -->
  <g transform="translate(460, 130)">
    <rect width="110" height="140" rx="8" fill="#111827" stroke="#475569" />
    <text x="55" y="25" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="10" font-weight="bold">STDOUT / FILE</text>
    <rect x="10" y="45" width="90" height="80" rx="4" fill="#020617" />
    <text x="15" y="65" fill="#f59e0b" font-family="monospace" font-size="7">{</text>
    <text x="20" y="78" fill="#f59e0b" font-family="monospace" font-size="7"> "msg": "...",</text>
    <text x="20" y="91" fill="#f59e0b" font-family="monospace" font-size="7"> "user_id": 42</text>
    <text x="15" y="104" fill="#f59e0b" font-family="monospace" font-size="7">}</text>
  </g>

  <!-- Arrows -->
  <path d="M 200 150 L 235 150" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow-blue)" />
  <path d="M 330 220 Q 330 250 455 200" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrow-green)" />

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6366f1" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
