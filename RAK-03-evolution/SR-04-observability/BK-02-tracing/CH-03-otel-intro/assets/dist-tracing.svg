<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Tahoma" font-size="22" font-weight="900">Distributed Tracing Pipeline</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">CONTEXT PROPAGATION &amp; TELEMETRY EXPORT</text>

  <!-- Service A (Gateway) -->
  <g transform="translate(40, 120)">
    <rect width="140" height="180" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="2" />
    <text x="70" y="25" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="12" font-weight="bold">Gateway Service</text>
    
    <rect x="15" y="45" width="110" height="30" rx="4" fill="#1e293b" />
    <text x="70" y="64" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="8">TraceID: 0xABC...</text>
    
    <rect x="15" y="85" width="110" height="45" rx="4" fill="#1e3a5f" />
    <text x="70" y="105" text-anchor="middle" fill="#93c5fd" font-family="Segoe UI" font-size="8">Root Span</text>
    <text x="70" y="118" text-anchor="middle" fill="#60a5fa" font-family="Segoe UI" font-size="7">HTTP GET /order</text>

    <!-- Exporter -->
    <rect x="25" y="145" width="90" height="20" rx="10" fill="#10b981" />
    <text x="70" y="159" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="8" font-weight="bold">Exporter (OTLP)</text>
  </g>

  <!-- Propagation Arrow -->
  <path d="M 180 180 L 260 180" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-gold)" />
  <text x="220" y="170" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="8">Header: traceparent</text>

  <!-- Service B (API) -->
  <g transform="translate(260, 120)">
    <rect width="140" height="180" rx="10" fill="#0f172a" stroke="#a855f7" stroke-width="2" />
    <text x="70" y="25" text-anchor="middle" fill="#a855f7" font-family="Segoe UI" font-size="12" font-weight="bold">Order API</text>
    
    <rect x="15" y="45" width="110" height="30" rx="4" fill="#1e293b" />
    <text x="70" y="64" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="8">TraceID: 0xABC...</text>
    
    <rect x="15" y="85" width="110" height="45" rx="4" fill="#4c1d95" />
    <text x="70" y="105" text-anchor="middle" fill="#c084fc" font-family="Segoe UI" font-size="8">Child Span</text>
    <text x="70" y="118" text-anchor="middle" fill="#a855f7" font-family="Segoe UI" font-size="7">DB.Query</text>

    <!-- Exporter -->
    <rect x="25" y="145" width="90" height="20" rx="10" fill="#10b981" />
    <text x="70" y="159" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="8" font-weight="bold">Exporter (OTLP)</text>
  </g>

  <!-- Collector & Visualizer -->
  <g transform="translate(450, 130)">
    <rect width="120" height="80" rx="8" fill="#111827" stroke="#10b981" stroke-width="2" filter="url(#glow)" />
    <text x="60" y="30" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="10" font-weight="bold">OTel Collector</text>
    <path d="M 20 50 L 100 50 M 20 65 L 80 65" stroke="#34d399" stroke-width="4" stroke-linecap="round" />
    
    <rect y="110" width="120" height="60" rx="8" fill="#1e293b" stroke="#f8fafc" />
    <text x="60" y="135" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI" font-size="10" font-weight="bold">Visualizer</text>
    <text x="60" y="155" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="8">(Jaeger / Grafana)</text>
  </g>

  <!-- Exporting Arrows -->
  <path d="M 110 300 Q 300 350 510 210" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.6" marker-end="url(#arrow-green)" />
  <path d="M 330 300 Q 420 320 500 210" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.6" marker-end="url(#arrow-green)" />

  <!-- Markers -->
  <defs>
    <marker id="arrow-gold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
