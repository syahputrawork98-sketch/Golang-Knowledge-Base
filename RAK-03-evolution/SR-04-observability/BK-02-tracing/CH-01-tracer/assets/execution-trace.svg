<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Tahoma" font-size="22" font-weight="900">Go Execution Tracer Timeline</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">EVENT-BASED SCHEDULER ORCHESTRATION</text>

  <!-- Timeline Axis -->
  <line x1="100" y1="350" x2="550" y2="350" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <text x="540" y="370" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="10">Time (ns)</text>

  <!-- Processors -->
  <text x="40" y="150" fill="#3b82f6" font-family="Segoe UI" font-size="12" font-weight="bold">Proc 0</text>
  <text x="40" y="250" fill="#3b82f6" font-family="Segoe UI" font-size="12" font-weight="bold">Proc 1</text>

  <!-- Proc 0 Timeline -->
  <rect x="100" y="130" width="80" height="40" rx="4" fill="url(#grad-cyan)" filter="url(#glow)" />
  <text x="140" y="155" text-anchor="middle" fill="white" font-family="monospace" font-size="10">G1: worker</text>
  
  <rect x="220" y="130" width="120" height="40" rx="4" fill="#1e293b" stroke="#06b6d4" stroke-dasharray="4" />
  <text x="280" y="155" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">Idle / Syscall</text>

  <rect x="380" y="130" width="100" height="40" rx="4" fill="url(#grad-cyan)" filter="url(#glow)" />
  <text x="430" y="155" text-anchor="middle" fill="white" font-family="monospace" font-size="10">G3: network</text>

  <!-- Proc 1 Timeline -->
  <rect x="120" y="230" width="150" height="40" rx="4" fill="#7c3aed" opacity="0.8" />
  <text x="195" y="255" text-anchor="middle" fill="white" font-family="monospace" font-size="10">G2: main.work</text>
  
  <!-- STW Event -->
  <rect x="300" y="110" width="20" height="180" fill="#ef4444" opacity="0.4" />
  <text x="310" y="100" text-anchor="middle" fill="#fca5a5" font-family="Segoe UI" font-size="9" font-weight="bold">STW (GC)</text>

  <!-- Handoff Arrows -->
  <path d="M 180 150 Q 250 180 380 150" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrow-cyan)" />
  <text x="280" y="175" text-anchor="middle" fill="#06b6d4" font-family="Segoe UI" font-size="8">unblock signal</text>

  <!-- Interface Box -->
  <g transform="translate(100, 300)">
    <rect width="450" height="30" rx="4" fill="#111827" stroke="#475569" stroke-width="1" />
    <text x="10" y="20" fill="#f8fafc" font-family="Segoe UI" font-size="9">View: Goroutine Analysis | Network Blocking | Syscall Latency | Scheduler Latency</text>
  </g>

  <!-- Markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#06b6d4" />
    </marker>
  </defs>
</svg>
