<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Tahoma" font-size="22" font-weight="900">Semantic Tracing Architecture</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">USER-DEFINED TASKS &amp; REGIONS</text>

  <!-- Task Logic -->
  <g transform="translate(50, 100)">
    <rect width="220" height="240" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="2" filter="url(#glow)" />
    <text x="110" y="30" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="14" font-weight="bold">trace.Task (Logical Unit)</text>
    
    <!-- Regions -->
    <rect x="20" y="60" width="180" height="60" rx="6" fill="#1e293b" stroke="#10b981" />
    <text x="30" y="85" fill="#10b981" font-family="monospace" font-size="10" font-weight="bold">Region 1: Auth</text>
    <text x="30" y="105" fill="#94a3b8" font-family="Segoe UI" font-size="9">Single-goroutine span</text>

    <rect x="20" y="140" width="180" height="60" rx="6" fill="#1e293b" stroke="#f59e0b" />
    <text x="30" y="165" fill="#f59e0b" font-family="monospace" font-size="10" font-weight="bold">Region 2: Database</text>
    <text x="30" y="185" fill="#94a3b8" font-family="Segoe UI" font-size="9">Single-goroutine span</text>

    <!-- Context Flow -->
    <path d="M 0 40 L 0 200" stroke="#3b82f6" stroke-width="4" stroke-dasharray="8,4" />
    <text x="-15" y="130" transform="rotate(-90, -15, 130)" fill="#64748b" font-family="Segoe UI" font-size="9" font-weight="bold">CONTEXT PROPAGATION</text>
  </g>

  <!-- Visualization Output -->
  <g transform="translate(320, 120)">
    <rect width="230" height="180" rx="8" fill="#1e293b" stroke="#94a3b8" />
    <text x="115" y="25" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI" font-size="12" font-weight="bold">Trace UI Visualization</text>
    
    <!-- Gantt Chart View -->
    <line x1="20" y1="60" x2="210" y2="60" stroke="#475569" stroke-width="1" />
    <text x="20" y="55" fill="#94a3b8" font-family="Segoe UI" font-size="8">Task: ProcessOrder</text>
    <rect x="40" y="70" width="60" height="20" rx="2" fill="#10b981" opacity="0.8" />
    <text x="45" y="83" fill="white" font-family="Segoe UI" font-size="8">Validation</text>

    <rect x="110" y="100" width="90" height="20" rx="2" fill="#f59e0b" opacity="0.8" />
    <text x="115" y="113" fill="white" font-family="Segoe UI" font-size="8">DatabaseUpdate</text>

    <!-- Log entry -->
    <circle cx="150" cy="140" r="4" fill="#3b82f6" />
    <text x="160" y="145" fill="#3b82f6" font-family="Segoe UI" font-size="8">Log: OrderID=123</text>
  </g>

  <!-- Connection -->
  <path d="M 270 220 L 315 220" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
  </defs>
</svg>
