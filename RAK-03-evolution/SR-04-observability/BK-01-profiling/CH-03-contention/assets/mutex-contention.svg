<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad-red" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:0" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  <circle cx="300" cy="200" r="150" fill="url(#grad-red)" />

  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Tahoma" font-size="22" font-weight="900">Mutex Contention Analysis</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">BOTTLENECK IDENTIFICATION &amp; LOCK WAIT</text>

  <!-- Contended Resource -->
  <g transform="translate(250, 150)">
    <rect width="100" height="100" rx="12" fill="#0f172a" stroke="#ef4444" stroke-width="2" filter="url(#glow)" />
    <path d="M 50 30 L 50 45 M 50 55 C 40 55 40 75 50 75 C 60 75 60 55 50 55" fill="none" stroke="#ef4444" stroke-width="4" />
    <text x="50" y="90" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="12" font-weight="900">LOCKED</text>
  </g>

  <!-- Waiting Goroutines -->
  <g transform="translate(50, 100)">
    <text x="0" y="30" fill="#94a3b8" font-family="Segoe UI" font-size="14" font-weight="bold">Wait Queue</text>
    <rect x="0" y="50" width="160" height="40" rx="4" fill="#1e293b" opacity="0.8" />
    <text x="10" y="75" fill="#fca5a5" font-family="monospace" font-size="10">G1: waiting 12ms</text>
    <rect x="0" y="100" width="160" height="40" rx="4" fill="#1e293b" opacity="0.6" />
    <text x="10" y="125" fill="#fca5a5" font-family="monospace" font-size="10">G2: waiting 8ms</text>
    <rect x="0" y="150" width="160" height="40" rx="4" fill="#1e293b" opacity="0.4" />
    <text x="10" y="175" fill="#fca5a5" font-family="monospace" font-size="10">G3: waiting 4ms</text>
  </g>

  <!-- Profile Output -->
  <g transform="translate(380, 100)">
    <rect width="180" height="200" rx="8" fill="#1e293b" stroke="#3b82f6" />
    <text x="90" y="30" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI" font-size="12" font-weight="bold">Mutex Profile</text>
    
    <!-- Graph Representation -->
    <rect x="20" y="60" width="140" height="110" rx="4" fill="#0f172a" />
    <circle cx="90" cy="115" r="30" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" />
    <text x="90" y="120" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="8" font-weight="bold">main.worker</text>
    <text x="90" y="160" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="10" font-weight="bold">42s accumulated wait</text>
  </g>

  <!-- Detection Arrow -->
  <path d="M 350 200 L 375 200" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <text x="362" y="180" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="9" font-weight="bold" transform="rotate(-90, 362, 180)">REPORT</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
  </defs>
</svg>
