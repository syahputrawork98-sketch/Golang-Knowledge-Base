<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b21a8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Tahoma" font-size="22" font-weight="900">Goroutine Leak Analysis</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">STACK TRACE GROUPING &amp; LEAK DETECTION</text>

  <!-- Goroutine Stack -->
  <g transform="translate(50, 100)">
    <rect width="220" height="240" rx="12" fill="#0f172a" stroke="#a855f7" stroke-width="2" filter="url(#glow)" />
    <text x="110" y="30" text-anchor="middle" fill="#a855f7" font-family="Segoe UI" font-size="14" font-weight="bold">Goroutine Population</text>
    
    <!-- Healthy Goroutines -->
    <rect x="20" y="50" width="80" height="20" rx="4" fill="#14532d" />
    <text x="60" y="63" text-anchor="middle" fill="#6ee7b7" font-family="Segoe UI" font-size="9">G1: main</text>
    <rect x="120" y="50" width="80" height="20" rx="4" fill="#14532d" />
    <text x="160" y="63" text-anchor="middle" fill="#6ee7b7" font-family="Segoe UI" font-size="9">G2: runtime</text>

    <!-- Leaking Goroutines Group -->
    <rect x="20" y="90" width="180" height="130" rx="8" fill="#4c1d95" opacity="0.4" stroke="#ef4444" stroke-dasharray="4" />
    <text x="110" y="110" text-anchor="middle" fill="#fca5a5" font-family="Segoe UI" font-size="11" font-weight="bold">LEAK IDENTIFIED</text>
    
    <!-- Multiple identical stacks -->
    <rect x="40" y="125" width="140" height="15" rx="2" fill="#7f1d1d" />
    <rect x="40" y="145" width="140" height="15" rx="2" fill="#7f1d1d" />
    <rect x="40" y="165" width="140" height="15" rx="2" fill="#7f1d1d" />
    <text x="110" y="205" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="9">100x same stack trace</text>
    <text x="110" y="220" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="8">waiting on chan recv</text>
  </g>

  <!-- Inspection UI -->
  <g transform="translate(320, 150)">
    <rect width="230" height="150" rx="8" fill="#1e293b" stroke="#94a3b8" />
    <text x="115" y="25" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI" font-size="12" font-weight="bold">Debug Output (debug=1)</text>
    
    <text x="15" y="55" fill="#34d399" font-family="monospace" font-size="9">goroutine 100 [chan receive]:</text>
    <text x="15" y="70" fill="#94a3b8" font-family="monospace" font-size="9">main.leakedWorker(0xc000...)</text>
    <text x="30" y="85" fill="#64748b" font-family="monospace" font-size="9">/main.go:12 +0x2b</text>
    
    <text x="15" y="110" fill="#ef4444" font-family="Segoe UI" font-size="10" font-weight="bold">Diagnostic:</text>
    <text x="15" y="125" fill="#fca5a5" font-family="Segoe UI" font-size="9">100 goroutines blocked</text>
    <text x="15" y="138" fill="#fca5a5" font-family="Segoe UI" font-size="9">at the same code location!</text>
  </g>

  <!-- Alert -->
  <circle cx="280" cy="220" r="25" fill="#ef4444" filter="url(#glow)" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1s" repeatCount="indefinite" />
  </circle>
  <text x="280" y="224" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="20" font-weight="900">!</text>

  <!-- Arrows -->
  <path d="M 275 240 L 315 240" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)" />

  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
  </defs>
</svg>
