<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Tahoma" font-size="22" font-weight="900">Go Memory Allocator Hierarchy</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">TCMALLOC-BASED MSPAN MANAGEMENT</text>

  <!-- Level 1: mcache (Local) -->
  <g transform="translate(50, 100)">
    <rect width="120" height="150" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="2" filter="url(#glow)" />
    <text x="60" y="30" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="12" font-weight="bold">mcache</text>
    <text x="60" y="50" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">(Per-Processor P)</text>
    <rect x="20" y="70" width="80" height="15" rx="2" fill="#1e3a5f" />
    <rect x="20" y="90" width="80" height="15" rx="2" fill="#1e3a5f" />
    <rect x="20" y="110" width="80" height="15" rx="2" fill="#1e3a5f" />
    <text x="60" y="140" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="9" font-weight="bold">NO LOCK</text>
  </g>

  <!-- Level 2: mcentral (Shared) -->
  <g transform="translate(240, 100)">
    <rect width="120" height="150" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2" />
    <text x="60" y="30" text-anchor="middle" fill="#f59e0b" font-family="Segoe UI" font-size="12" font-weight="bold">mcentral</text>
    <text x="60" y="50" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">(Global Pool)</text>
    <rect x="15" y="70" width="90" height="60" rx="4" fill="#431407" />
    <text x="60" y="140" text-anchor="middle" fill="#fca5a5" font-family="Segoe UI" font-size="9" font-weight="bold">LOCK per SizeClass</text>
  </g>

  <!-- Level 3: mheap (Central) -->
  <g transform="translate(430, 100)">
    <rect width="120" height="150" rx="10" fill="#0f172a" stroke="#ef4444" stroke-width="2" />
    <text x="60" y="30" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="12" font-weight="bold">mheap</text>
    <text x="60" y="50" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">(System Heap)</text>
    <rect x="15" y="70" width="90" height="60" rx="4" fill="#450a0a" />
    <text x="60" y="140" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="9" font-weight="bold">GLOBAL LOCK</text>
  </g>

  <!-- Arrows -->
  <path d="M 170 175 L 240 175" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <path d="M 360 175 L 430 175" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-gold)" />
  
  <text x="205" y="165" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">fetch span</text>
  <text x="395" y="165" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">refill pool</text>

  <!-- Alloc Flow -->
  <path d="M 110 300 Q 300 380 490 300" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-start="url(#dot)" marker-end="url(#arrow-green)" />
  <text x="300" y="340" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="10" font-weight="bold">Memory Flow (Alloc ↔ Free)</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-gold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="3" fill="#10b981" />
    </marker>
  </defs>
</svg>
