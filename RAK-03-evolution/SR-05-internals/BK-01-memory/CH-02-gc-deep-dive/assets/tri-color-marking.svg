<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Tahoma" font-size="22" font-weight="900">Go Tri-color Marking Algorithm</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">CONCURRENT GARBAGE COLLECTION INTERNALS</text>

  <!-- Legend -->
  <g transform="translate(450, 80)">
    <circle cx="0" cy="0" r="8" fill="#1e293b" stroke="#94a3b8" />
    <text x="15" y="4" fill="#94a3b8" font-family="Segoe UI" font-size="10">White: Unvisited (Candidate)</text>
    <circle cx="0" cy="25" r="8" fill="#64748b" stroke="#94a3b8" />
    <text x="15" y="29" fill="#94a3b8" font-family="Segoe UI" font-size="10">Grey: To be scanned</text>
    <circle cx="0" cy="50" r="8" fill="#1e1e1e" stroke="#10b981" stroke-width="2" />
    <text x="15" y="54" fill="#94a3b8" font-family="Segoe UI" font-size="10">Black: Scanned &amp; Safe</text>
  </g>

  <!-- Objects -->
  <!-- Black Root -->
  <circle cx="100" cy="200" r="25" fill="#020617" stroke="#10b981" stroke-width="3" filter="url(#glow)" />
  <text x="100" y="205" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="12" font-weight="bold">ROOT</text>

  <!-- Connection Root to Grey -->
  <path d="M 125 200 L 225 150" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />
  <path d="M 125 200 L 225 250" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />

  <!-- Grey Objects -->
  <circle cx="250" cy="150" r="20" fill="#475569" stroke="#94a3b8" />
  <text x="250" y="154" text-anchor="middle" fill="white" font-family="monospace" font-size="10">Obj A</text>
  
  <circle cx="250" cy="250" r="20" fill="#475569" stroke="#94a3b8" />
  <text x="250" y="254" text-anchor="middle" fill="white" font-family="monospace" font-size="10">Obj B</text>

  <!-- Connection Grey to White -->
  <path d="M 270 150 L 370 120" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrow-grey)" />
  <path d="M 270 250 L 370 280" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrow-grey)" />

  <!-- White Objects -->
  <circle cx="400" cy="120" r="20" fill="#1e293b" stroke="#475569" />
  <text x="400" y="124" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">Obj C</text>

  <circle cx="400" cy="280" r="20" fill="#1e293b" stroke="#475569" />
  <text x="400" y="284" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">Obj D</text>

  <!-- Unreachable White -->
  <circle cx="400" cy="200" r="20" fill="#450a0a" stroke="#ef4444" />
  <text x="400" y="204" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="10">Dead</text>
  <text x="400" y="235" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="9">Unreachable → GC</text>

  <!-- Write Barrier Note -->
  <rect x="180" y="320" width="240" height="50" rx="8" fill="#1e293b" stroke="#3b82f6" />
  <text x="300" y="340" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="11" font-weight="bold">WRITE BARRIER ACTIVE</text>
  <text x="300" y="358" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">Blocks direct pointer from Black to White</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arrow-grey" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>
</svg>
