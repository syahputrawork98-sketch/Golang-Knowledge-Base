<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Tahoma" font-size="22" font-weight="900">Go Escape Analysis Logic</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">COMPILER-LEVEL ALLOCATION DECISIONS</text>

  <!-- Stack Area -->
  <g transform="translate(50, 100)">
    <rect width="220" height="240" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="2" filter="url(#glow)" />
    <text x="110" y="30" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="14" font-weight="bold">STACK (LIFO)</text>
    
    <!-- Stack Frames -->
    <rect x="20" y="50" width="180" height="40" rx="4" fill="#1e293b" />
    <text x="30" y="75" fill="#93c5fd" font-family="monospace" font-size="10">main() frame</text>
    
    <rect x="20" y="100" width="180" height="40" rx="4" fill="#1e3a5f" />
    <text x="30" y="125" fill="#60a5fa" font-family="monospace" font-size="10">calculate() frame</text>
    <circle cx="180" cy="120" r="5" fill="#10b981" />
    <text x="110" y="155" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="9">Private &amp; Fast</text>
    
    <path d="M 110 180 L 110 230" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
    <text x="110" y="210" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9" transform="rotate(-90, 110, 210)">POP (Auto Cleanup)</text>
  </g>

  <!-- Decision Point -->
  <g transform="translate(270, 180)">
    <rect x="0" y="0" width="60" height="60" rx="4" fill="#020617" stroke="#94a3b8" transform="rotate(45, 30, 30)" />
    <text x="30" y="35" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI" font-size="10" font-weight="bold">Escapes?</text>
  </g>

  <!-- Heap Area -->
  <g transform="translate(330, 100)">
    <rect width="220" height="240" rx="12" fill="#0f172a" stroke="#f59e0b" stroke-width="2" filter="url(#glow)" />
    <text x="110" y="30" text-anchor="middle" fill="#f59e0b" font-family="Segoe UI" font-size="14" font-weight="bold">HEAP (Global)</text>
    
    <!-- Heap Objects -->
    <rect x="30" y="60" width="80" height="40" rx="8" fill="#431407" />
    <text x="70" y="85" text-anchor="middle" fill="#fb923c" font-family="monospace" font-size="9">Large Object</text>
    
    <rect x="120" y="120" width="70" height="50" rx="8" fill="#431407" />
    <text x="155" y="150" text-anchor="middle" fill="#fb923c" font-family="monospace" font-size="9">Pointer Ref</text>
    
    <rect x="40" y="180" width="140" height="30" rx="4" fill="#022c22" stroke="#10b981" />
    <text x="110" y="200" text-anchor="middle" fill="#34d399" font-family="Segoe UI" font-size="10">Managed by GC</text>
  </g>

  <!-- Escape Arrows -->
  <path d="M 230 150 Q 280 150 330 200" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrow-red)" />
  <text x="280" y="140" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="9" font-weight="bold">YES (Heap)</text>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
  </defs>
</svg>
