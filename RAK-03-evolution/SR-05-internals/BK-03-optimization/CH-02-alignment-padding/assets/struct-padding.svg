<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Tahoma" font-size="22" font-weight="900">Struct Padding &amp; Memory Alignment</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">MECHANICAL SYMPATHY: WORD-ALIGNMENT</text>

  <!-- Legend -->
  <g transform="translate(50, 80)">
    <rect width="15" height="15" fill="#3b82f6" rx="2" />
    <text x="20" y="12" fill="#94a3b8" font-family="Segoe UI" font-size="10">Data Byte</text>
    <rect x="100" y="0" width="15" height="15" fill="#450a0a" stroke="#ef4444" rx="2" />
    <text x="120" y="12" fill="#94a3b8" font-family="Segoe UI" font-size="10">Padding Byte (Wasted)</text>
  </g>

  <!-- Case 1: Bad Alignment (24 Bytes) -->
  <g transform="translate(50, 130)">
    <text x="0" y="-10" fill="#ef4444" font-family="Segoe UI" font-size="12" font-weight="bold">BAD ALIGNMENT (24 Bytes)</text>
    <rect width="500" height="40" fill="#0f172a" stroke="#ef4444" stroke-width="2" />
    
    <!-- Word 1 -->
    <rect x="0" y="0" width="62.5" height="40" fill="#3b82f6" stroke="#020617" />
    <text x="31" y="25" text-anchor="middle" fill="white" font-family="monospace" font-size="8">bool</text>
    <rect x="62.5" y="0" width="437.5" height="40" fill="#450a0a" stroke="#020617" />
    <text x="281" y="25" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="10">Padding (43.75% of Word 1-3)</text>
    
    <!-- Word 2 (Conceptual Overlap) -->
    <rect x="50" y="50" width="500" height="40" fill="#0f172a" stroke="#ef4444" stroke-width="2" />
    <rect x="0" y="50" width="500" height="40" fill="#1e3a5f" stroke="#020617" />
    <text x="250" y="75" text-anchor="middle" fill="white" font-family="monospace" font-size="10">int64 (8 Bytes)</text>
  </g>

  <!-- Case 2: Good Alignment (16 Bytes) -->
  <g transform="translate(50, 260)">
    <text x="0" y="-10" fill="#10b981" font-family="Segoe UI" font-size="12" font-weight="bold">GOOD ALIGNMENT (16 Bytes)</text>
    <rect width="500" height="40" fill="#0f172a" stroke="#10b981" stroke-width="2" filter="url(#glow)" />
    
    <!-- int64 -->
    <rect x="0" y="0" width="250" height="40" fill="#1e3a5f" stroke="#020617" />
    <text x="125" y="25" text-anchor="middle" fill="white" font-family="monospace" font-size="10">int64 (8 Bytes)</text>
    
    <!-- 2nd Word -->
    <rect x="250" y="0" width="31.25" height="40" fill="#3b82f6" stroke="#020617" />
    <rect x="281.25" y="0" width="31.25" height="40" fill="#3b82f6" stroke="#020617" />
    <text x="265" y="25" text-anchor="middle" fill="white" font-family="monospace" font-size="7">bool</text>
    <text x="296" y="25" text-anchor="middle" fill="white" font-family="monospace" font-size="7">bool</text>
    
    <!-- Padding -->
    <rect x="312.5" y="0" width="187.5" height="40" fill="#450a0a" stroke="#020617" opacity="0.3" />
    <text x="406" y="25" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="8">Padding (Minimal)</text>
  </g>

  <text x="300" y="380" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="11">Rule: Sort fields from largest to smallest to minimize gaps.</text>
</svg>
