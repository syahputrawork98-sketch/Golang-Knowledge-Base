<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Tahoma" font-size="22" font-weight="900">sync.Pool Object Lifecycle</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">ZERO-ALLOCATION &amp; RECYCLING</text>

  <!-- Application / Worker -->
  <g transform="translate(50, 150)">
    <rect width="120" height="100" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="2" />
    <text x="60" y="55" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="14" font-weight="bold">Worker</text>
  </g>

  <!-- Pool -->
  <g transform="translate(250, 120)">
    <rect width="200" height="180" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#glow)" />
    <text x="100" y="30" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="14" font-weight="bold">sync.Pool</text>
    
    <!-- Objects in Pool -->
    <rect x="30" y="50" width="40" height="40" rx="4" fill="#064e3b" stroke="#34d399" />
    <rect x="80" y="50" width="40" height="40" rx="4" fill="#064e3b" stroke="#34d399" />
    <rect x="130" y="50" width="40" height="40" rx="4" fill="#064e3b" stroke="#34d399" />
    <text x="100" y="110" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="10">Available Objects</text>

    <!-- New Allocation Branch -->
    <rect x="30" y="130" width="140" height="30" rx="4" fill="#1e1b4b" stroke="#6366f1" />
    <text x="100" y="150" text-anchor="middle" fill="#818cf8" font-family="Segoe UI" font-size="9" font-weight="bold">New() if Pool Empty</text>
  </g>

  <!-- Flow Arrows -->
  <!-- Get -->
  <path d="M 170 180 L 240 180" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-gold)" />
  <text x="205" y="170" text-anchor="middle" fill="#f59e0b" font-family="Segoe UI" font-size="10" font-weight="bold">Get()</text>

  <!-- Put -->
  <path d="M 240 220 L 170 220" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />
  <text x="205" y="240" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="10" font-weight="bold">Put()</text>

  <!-- Reset Label -->
  <text x="100" y="270" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="9" font-weight="bold">Reset State Before Put!</text>

  <!-- GC Phase -->
  <g transform="translate(480, 180)">
    <rect x="-10" y="-30" width="100" height="60" rx="8" fill="#450a0a" stroke="#ef4444" />
    <text x="40" y="0" text-anchor="middle" fill="#fca5a5" font-family="Segoe UI" font-size="10" font-weight="bold">GC Cycle</text>
    <path d="M -30 0 L -10 0" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)" />
    <text x="40" y="20" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="8">Clear Pool</text>
  </g>

  <!-- Markers -->
  <defs>
    <marker id="arrow-gold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
  </defs>
</svg>
