<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Tahoma" font-size="22" font-weight="900">Go G-M-P Scheduler Architecture</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">M:N MULTI-THREADED SCHEDULING</text>

  <!-- Global Run Queue (GRQ) -->
  <g transform="translate(200, 100)">
    <rect width="200" height="40" rx="4" fill="#1e293b" stroke="#94a3b8" stroke-dasharray="4" />
    <text x="100" y="25" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="10" font-weight="bold">GRQ (Global Run Queue)</text>
    <circle cx="30" cy="22" r="6" fill="#6366f1" />
    <circle cx="50" cy="22" r="6" fill="#6366f1" />
    <circle cx="170" cy="22" r="6" fill="#6366f1" />
  </g>

  <!-- Processor P1 Branch -->
  <g transform="translate(100, 180)">
    <!-- M: OS Thread -->
    <rect width="80" height="40" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="2" />
    <text x="40" y="25" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="12" font-weight="bold">M (Thread)</text>
    
    <path d="M 40 40 L 40 80" stroke="#f8fafc" stroke-width="2" stroke-dasharray="2" />
    
    <!-- P: Processor -->
    <rect y="80" width="80" height="40" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#glow)" />
    <text x="40" y="105" text-anchor="middle" fill="#f59e0b" font-family="Segoe UI" font-size="12" font-weight="bold">P (Sched)</text>
    
    <!-- LRQ -->
    <rect y="130" width="80" height="80" rx="4" fill="#020617" stroke="#3b82f6" />
    <text x="40" y="145" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="8">LRQ</text>
    <circle cx="40" cy="165" r="8" fill="#6366f1" />
    <text x="40" y="169" text-anchor="middle" fill="white" font-family="monospace" font-size="8" font-weight="bold">G</text>
    <circle cx="40" cy="185" r="8" fill="#6366f1" />
    <text x="40" y="189" text-anchor="middle" fill="white" font-family="monospace" font-size="8" font-weight="bold">G</text>
  </g>

  <!-- Processor P2 Branch (Work Stealing) -->
  <g transform="translate(420, 180)">
    <rect width="80" height="40" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="2" opacity="0.5" />
    <text x="40" y="25" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="12" font-weight="bold" opacity="0.5">M</text>
    
    <path d="M 40 40 L 40 80" stroke="#f8fafc" stroke-width="2" stroke-dasharray="2" />

    <rect y="80" width="80" height="40" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2" />
    <text x="40" y="105" text-anchor="middle" fill="#f59e0b" font-family="Segoe UI" font-size="12" font-weight="bold">P</text>
    
    <!-- Empty LRQ -->
    <rect y="130" width="80" height="80" rx="4" fill="#020617" stroke="#3b82f6" opacity="0.5" />
    <text x="40" y="175" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="8">EMPTY</text>
  </g>

  <!-- Work Stealing Arrow -->
  <path d="M 420 280 L 180 280" stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#arrow-green)" />
  <text x="300" y="270" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="12" font-weight="bold">WORK STEALING</text>
  <text x="300" y="295" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="9">Steal 50% from other LRQ</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
