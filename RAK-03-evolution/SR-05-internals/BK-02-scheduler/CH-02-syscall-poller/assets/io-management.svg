<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#020617" rx="16" />
  
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Tahoma" font-size="22" font-weight="900">Netpoller vs Syscall Handoff</text>
  <text x="300" y="65" text-anchor="middle" fill="#475569" font-family="Segoe UI" font-size="12" letter-spacing="2">BLOCKING I/O MANAGEMENT</text>

  <!-- Case 1: Netpoller (Efficient) -->
  <g transform="translate(50, 100)">
    <rect width="220" height="240" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="2" />
    <text x="110" y="30" text-anchor="middle" fill="#3b82f6" font-family="Segoe UI" font-size="14" font-weight="bold">NETPOLLER (Async)</text>
    
    <rect x="20" y="50" width="180" height="80" rx="6" fill="#1e3a5f" />
    <text x="110" y="70" text-anchor="middle" fill="#93c5fd" font-family="Segoe UI" font-size="10" font-weight="bold">Wait Strategy: epoll/kqueue</text>
    
    <circle cx="60" cy="100" r="12" fill="#6366f1" filter="url(#glow)" />
    <text x="60" y="104" text-anchor="middle" fill="white" font-family="monospace" font-size="10" font-weight="bold">G</text>
    <text x="130" y="105" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI" font-size="9">Parked G (Waiting Conn)</text>
    
    <rect x="25" y="150" width="170" height="60" rx="4" fill="#020617" stroke="#10b981" />
    <text x="110" y="170" text-anchor="middle" fill="#10b981" font-family="Segoe UI" font-size="10" font-weight="bold">M (Thread) is FREE</text>
    <text x="110" y="185" text-anchor="middle" fill="#64748b" font-family="Segoe UI" font-size="8">M continues other Gs</text>
  </g>

  <!-- Case 2: Syscall (Handoff) -->
  <g transform="translate(330, 100)">
    <rect width="220" height="240" rx="12" fill="#450a0a" stroke="#ef4444" stroke-width="2" />
    <text x="110" y="30" text-anchor="middle" fill="#fca5a5" font-family="Segoe UI" font-size="14" font-weight="bold">SYSCALL (Sync)</text>
    
    <rect x="25" y="50" width="170" height="80" rx="6" fill="#1e293b" stroke="#f8fafc" />
    <text x="110" y="75" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="12" font-weight="bold">G + M</text>
    <text x="110" y="100" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="10" font-weight="bold">BLOCKING IN KERNEL</text>
    
    <path d="M 50 150 L 170 150" stroke="#f8fafc" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow-red)" />
    
    <rect x="25" y="170" width="80" height="45" rx="4" fill="#1e293b" stroke="#f59e0b" />
    <text x="65" y="195" text-anchor="middle" fill="#f59e0b" font-family="Segoe UI" font-size="12" font-weight="bold">P</text>
    <text x="155" y="190" text-anchor="middle" fill="#fca5a5" font-family="Segoe UI" font-size="10">P detached</text>
    <text x="155" y="205" text-anchor="middle" fill="#ef4444" font-family="Segoe UI" font-size="9" font-weight="bold">Create/Find new M</text>
  </g>

  <!-- Markers -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
  </defs>
</svg>
