<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f7f1e3"/>
  
  <!-- Root -->
  <rect x="250" y="20" width="100%" height="40" rx="5" fill="#2c3e50" stroke="#34495e" transform="translate(-250, 0)"/>
  <rect x="230" y="20" width="140" height="40" rx="5" fill="#2c3e50" stroke="#34495e"/>
  <text x="255" y="45" font-family="Arial" font-size="14" fill="white">Background()</text>
  
  <!-- Parent -->
  <path d="M 300 60 L 300 100" stroke="#34495e" stroke-width="2" fill="none"/>
  <rect x="210" y="100" width="180" height="50" rx="5" fill="#3498db" stroke="#2980b9"/>
  <text x="230" y="130" font-family="Arial" font-size="14" fill="white" font-weight="bold">Parent: WithCancel</text>
  
  <!-- Children -->
  <path d="M 300 150 L 150 200" stroke="#34495e" stroke-width="2" fill="none" marker-end="url(#dot)"/>
  <path d="M 300 150 L 450 200" stroke="#34495e" stroke-width="2" fill="none" marker-end="url(#dot)"/>
  
  <rect x="60" y="200" width="180" height="50" rx="5" fill="#e67e22" stroke="#d35400"/>
  <text x="80" y="230" font-family="Arial" font-size="14" fill="white">Child A: WithTimeout</text>
  
  <rect x="360" y="200" width="180" height="50" rx="5" fill="#9b59b6" stroke="#8e44ad"/>
  <text x="380" y="230" font-family="Arial" font-size="14" fill="white">Child B: WithValue</text>
  
  <!-- Cancellation Wave -->
  <path d="M 400 125 L 500 125" stroke="#e74c3c" stroke-width="4" stroke-dasharray="5,5"/>
  <text x="410" y="115" font-family="Arial" font-size="12" fill="#e74c3c" font-weight="bold">CANCEL SIGNAL</text>
  
  <!-- Propagation -->
  <path d="M 150 255 L 150 300" stroke="#e74c3c" stroke-width="2" fill="none" stroke-dasharray="2,2"/>
  <path d="M 450 255 L 450 300" stroke="#e74c3c" stroke-width="2" fill="none" stroke-dasharray="2,2"/>
  <text x="50" y="320" font-family="Arial" font-size="12" fill="#e74c3c">All children cancelled immediately!</text>
  
  <text x="50" y="380" font-family="Arial" font-size="12" font-style="italic" fill="#7f8c8d">Visualisasi: Context Propagation Tree</text>
</svg>
