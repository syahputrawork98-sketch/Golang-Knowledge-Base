<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#44bd32" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <!-- Stages -->
  <g transform="translate(30, 100)">
    <rect width="120" height="80" rx="5" fill="#353b48" stroke="#2f3640"/>
    <text x="30" y="45" font-family="Arial" font-size="14" fill="white" font-weight="bold">Source</text>
  </g>
  <g transform="translate(230, 100)">
    <rect width="120" height="80" rx="5" fill="#fbc531" stroke="#e1b12c"/>
    <text x="30" y="45" font-family="Arial" font-size="14" font-weight="bold">Process</text>
  </g>
  <g transform="translate(430, 100)">
    <rect width="120" height="80" rx="5" fill="#487eb0" stroke="#40739e"/>
    <text x="45" y="45" font-family="Arial" font-size="14" fill="white" font-weight="bold">Sink</text>
  </g>
  
  <!-- Pipelines (Channels) -->
  <path d="M 150 140 L 220 140" stroke="#44bd32" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 350 140 L 420 140" stroke="#44bd32" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  
  <text x="165" y="130" font-family="Arial" font-size="10" fill="#44bd32">chan int</text>
  <text x="365" y="130" font-family="Arial" font-size="10" fill="#44bd32">chan string</text>
  
  <!-- Data Particles -->
  <circle cx="180" cy="140" r="5" fill="#4cd137"/>
  <circle cx="380" cy="140" r="5" fill="#4cd137"/>
  
  <text x="50" y="270" font-family="Arial" font-size="12" font-style="italic" fill="#718093">Visualisasi: Pipeline Streaming Pattern</text>
</svg>
