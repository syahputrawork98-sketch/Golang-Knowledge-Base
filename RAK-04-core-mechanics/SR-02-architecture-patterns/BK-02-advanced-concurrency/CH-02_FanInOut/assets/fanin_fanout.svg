<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f1f2f6"/>
  
  <!-- Input -->
  <rect x="20" y="170" width="80" height="60" rx="5" fill="#2f3542" stroke="#2f3542"/>
  <text x="35" y="205" font-family="Arial" font-size="12" fill="white">Input</text>
  
  <!-- Fan Out -->
  <path d="M 100 200 L 250 100" stroke="#ff4757" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 100 200 L 250 200" stroke="#ff4757" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 100 200 L 250 300" stroke="#ff4757" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="140" y="130" font-family="Arial" font-size="12" fill="#ff4757" font-weight="bold">FAN-OUT</text>
  
  <!-- Workers -->
  <rect x="250" y="75" width="100%" height="50" rx="5" fill="#ffa502" stroke="#eccc68" transform="translate(-250, 0)"/>
  <rect x="250" y="75" width="100" height="50" rx="5" fill="#ffa502" stroke="#eccc68"/>
  <text x="270" y="105" font-family="Arial" font-size="12">Worker 1</text>
  
  <rect x="250" y="175" width="100" height="50" rx="5" fill="#ffa502" stroke="#eccc68"/>
  <text x="270" y="205" font-family="Arial" font-size="12">Worker 2</text>
  
  <rect x="250" y="275" width="100" height="50" rx="5" fill="#ffa502" stroke="#eccc68"/>
  <text x="270" y="305" font-family="Arial" font-size="12">Worker 3</text>
  
  <!-- Fan In -->
  <path d="M 350 100 L 500 200" stroke="#1e90ff" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>
  <path d="M 350 200 L 500 200" stroke="#1e90ff" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>
  <path d="M 350 300 L 500 200" stroke="#1e90ff" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>
  <text x="400" y="130" font-family="Arial" font-size="12" fill="#1e90ff" font-weight="bold">FAN-IN</text>
  
  <!-- Output -->
  <rect x="500" y="170" width="80" height="60" rx="5" fill="#2f3542" stroke="#2f3542"/>
  <text x="515" y="205" font-family="Arial" font-size="12" fill="white">Output</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4757" />
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e90ff" />
    </marker>
  </defs>
  
  <text x="50" y="380" font-family="Arial" font-size="12" font-style="italic" fill="#57606f">Visualisasi: Fan-In / Fan-Out Orchestration</text>
</svg>
