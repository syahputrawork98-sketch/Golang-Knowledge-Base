<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  
  <!-- Word 1 (8 Bytes) -->
  <g transform="translate(50, 50)">
    <text x="0" y="-10" font-family="Arial" font-size="14" font-weight="bold">Word 1 (8 Bytes)</text>
    <rect width="400" height="40" fill="#e9ecef" stroke="#dee2e6" stroke-width="2"/>
    <rect width="50" height="40" fill="#ff7675" stroke="#d63031" stroke-width="1"/>
    <text x="10" y="25" font-family="Arial" font-size="12" fill="white">bool(1)</text>
    <rect x="50" width="350" height="40" fill="#fab1a0" stroke="#e17055" stroke-dasharray="4"/>
    <text x="180" y="25" font-family="Arial" font-size="12" fill="#d63031">Padding (7 Bytes)</text>
  </g>

  <!-- Word 2 (8 Bytes) -->
  <g transform="translate(50, 120)">
    <text x="0" y="-10" font-family="Arial" font-size="14" font-weight="bold">Word 2 (8 Bytes)</text>
    <rect width="400" height="40" fill="#74b9ff" stroke="#0984e3" stroke-width="2"/>
    <text x="160" y="25" font-family="Arial" font-size="12" fill="white">int64 (8 Bytes)</text>
  </g>

  <!-- Word 3 (8 Bytes) -->
  <g transform="translate(50, 190)">
    <text x="0" y="-10" font-family="Arial" font-size="14" font-weight="bold">Word 3 (8 Bytes)</text>
    <rect width="400" height="40" fill="#e9ecef" stroke="#dee2e6" stroke-width="2"/>
    <rect width="50" height="40" fill="#ff7675" stroke="#d63031" stroke-width="1"/>
    <text x="10" y="25" font-family="Arial" font-size="12" fill="white">bool(1)</text>
    <rect x="50" width="350" height="40" fill="#fab1a0" stroke="#e17055" stroke-dasharray="4"/>
    <text x="180" y="25" font-family="Arial" font-size="12" fill="#d63031">Padding (7 Bytes)</text>
  </g>
  
  <text x="50" y="270" font-family="Arial" font-size="12" font-style="italic" fill="#636e72">Visualisasi: "BadStruct" Memory Layout (Total 24 Bytes)</text>
</svg>
