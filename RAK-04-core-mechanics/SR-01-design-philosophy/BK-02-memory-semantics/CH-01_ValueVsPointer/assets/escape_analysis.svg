<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f1f2f6"/>
  
  <!-- Stack Area -->
  <rect x="50" y="50" width="200" height="300" rx="10" fill="#dfe4ea" stroke="#707070" stroke-width="2"/>
  <text x="110" y="40" font-family="Arial" font-size="16" font-weight="bold">STACK</text>
  
  <rect x="70" y="70" width="160" height="60" rx="5" fill="#7bed9f" stroke="#2ed573"/>
  <text x="80" y="105" font-family="Arial" font-size="12">Func: StayOnStack()</text>
  
  <rect x="70" y="200" width="160" height="100" rx="5" fill="#ff4757" stroke="#ff6b81" stroke-dasharray="4"/>
  <text x="80" y="230" font-family="Arial" font-size="12" fill="white">Func: EscapeToHeap()</text>
  
  <!-- Heap Area -->
  <rect x="350" y="50" width="200" height="300" rx="10" fill="#ced4da" stroke="#495057" stroke-width="2"/>
  <text x="410" y="40" font-family="Arial" font-size="16" font-weight="bold">HEAP</text>
  
  <!-- Arrow Escape -->
  <path d="M 230 250 L 350 150" fill="none" stroke="#ff4757" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4757" />
    </marker>
  </defs>
  
  <circle cx="450" cy="150" r="30" fill="#ffa502" stroke="#ff7f50"/>
  <text x="430" y="155" font-family="Arial" font-size="12" font-weight="bold">Object</text>
  
  <text x="240" y="180" font-family="Arial" font-size="14" fill="#ff4757" transform="rotate(-30 240,180)">ESCAPES!</text>
  
  <text x="50" y="380" font-family="Arial" font-size="12" font-style="italic" fill="#2f3542">Visualisasi: Escape Analysis Mechanism</text>
</svg>
