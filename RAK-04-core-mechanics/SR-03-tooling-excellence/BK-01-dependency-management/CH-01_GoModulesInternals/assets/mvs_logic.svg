<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f1f2f6"/>
  
  <!-- Root -->
  <rect x="230" y="20" width="140" height="40" rx="5" fill="#2f3542" stroke="#2f3542"/>
  <text x="250" y="45" font-family="Arial" font-size="14" fill="white" font-weight="bold">Main Module</text>
  
  <!-- App A Modules -->
  <rect x="100" y="120" width="120" height="50" rx="5" fill="#1e90ff" stroke="#2f3542"/>
  <text x="120" y="150" font-family="Arial" font-size="12" fill="white">Lib A (v1.2.0)</text>
  
  <rect x="380" y="120" width="120" height="50" rx="5" fill="#1e90ff" stroke="#2f3542"/>
  <text x="400" y="150" font-family="Arial" font-size="12" fill="white">Lib B (v1.0.0)</text>
  
  <!-- Shared Dependency -->
  <rect x="240" y="250" width="120" height="50" rx="5" fill="#ffa502" stroke="#2f3542" stroke-width="3"/>
  <text x="250" y="280" font-family="Arial" font-size="12" font-weight="bold">Common (v1.5.0)</text>
  
  <!-- Connections -->
  <path d="M 300 60 L 160 120" stroke="#747d8c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 300 60 L 440 120" stroke="#747d8c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <path d="M 160 170 L 250 250" stroke="#747d8c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="130" y="220" font-family="Arial" font-size="10" fill="#747d8c">requires v1.4.0</text>
  
  <path d="M 440 170 L 350 250" stroke="#747d8c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="400" y="220" font-family="Arial" font-size="10" fill="#747d8c">requires v1.5.0</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#747d8c" />
    </marker>
  </defs>
  
  <text x="220" y="340" font-family="Arial" font-size="14" fill="#ffa502" font-weight="bold">MVS Result: v1.5.0</text>
  <text x="180" y="360" font-family="Arial" font-size="11" fill="#2f3542">(Minimal version that satisfies all requirements)</text>
  
  <text x="50" y="390" font-family="Arial" font-size="12" font-style="italic" fill="#747d8c">Visualisasi: Minimal Version Selection (MVS) Logic</text>
</svg>
