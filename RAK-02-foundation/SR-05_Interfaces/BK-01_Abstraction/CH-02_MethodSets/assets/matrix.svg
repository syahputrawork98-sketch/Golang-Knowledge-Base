<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="300" fill="#f8fafc" rx="10"/>
  
  <!-- Header -->
  <text x="300" y="40" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#1e293b">METHOD SET SATISFACTION MATRIX</text>
  
  <!-- Table Header -->
  <rect x="50" y="70" width="150" height="50" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="125" y="100" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Receiver Type</text>
  
  <rect x="200" y="70" width="175" height="50" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="287" y="100" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#0369a1">Value Argument (T)</text>
  
  <rect x="375" y="70" width="175" height="50" fill="#ecfdf5" stroke="#10b981"/>
  <text x="460" y="100" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#047857">Pointer Argument (*T)</text>

  <!-- Row 1: Value Receiver -->
  <rect x="50" y="120" width="150" height="70" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="125" y="160" font-family="Arial" font-size="12" text-anchor="middle" fill="#64748b">Value Receiver (T)</text>
  
  <rect x="200" y="120" width="175" height="70" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="287" y="160" font-family="Arial" font-size="24" text-anchor="middle" fill="#10b981">✓</text>
  
  <rect x="375" y="120" width="175" height="70" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="460" y="160" font-family="Arial" font-size="24" text-anchor="middle" fill="#10b981">✓</text>

  <!-- Row 2: Pointer Receiver -->
  <rect x="50" y="190" width="150" height="70" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="125" y="230" font-family="Arial" font-size="12" text-anchor="middle" fill="#64748b">Pointer Receiver (*T)</text>
  
  <rect x="200" y="190" width="175" height="70" fill="#fef2f2" stroke="#ef4444"/>
  <text x="287" y="230" font-family="Arial" font-size="24" text-anchor="middle" fill="#ef4444">✕</text>
  
  <rect x="375" y="190" width="175" height="70" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="460" y="230" font-family="Arial" font-size="24" text-anchor="middle" fill="#10b981">✓</text>

  <text x="300" y="285" font-family="Arial" font-size="10" font-style="italic" text-anchor="middle" fill="#64748b">*Value cannot satisfy Pointer-Receiver interfaces because it might not be addressable.</text>
</svg>
