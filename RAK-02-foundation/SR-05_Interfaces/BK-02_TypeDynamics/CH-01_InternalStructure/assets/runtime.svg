<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#f8fafc" rx="10"/>
  
  <!-- iface (Interface with methods) -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="220" height="120" fill="#ffffff" stroke="#6366f1" stroke-width="3" rx="8"/>
    <text x="110" y="-10" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#6366f1">iface (Non-Empty)</text>
    
    <rect x="10" y="20" width="200" height="40" fill="#e0e7ff" stroke="#6366f1" rx="4"/>
    <text x="20" y="45" font-family="Arial" font-size="12" font-weight="bold">*tab (itab)</text>
    
    <rect x="10" y="70" width="200" height="40" fill="#e0e7ff" stroke="#6366f1" rx="4"/>
    <text x="20" y="95" font-family="Arial" font-size="12" font-weight="bold">data (unsafe.Pointer)</text>
  </g>

  <!-- eface (Empty interface) -->
  <g transform="translate(330, 50)">
    <rect x="0" y="0" width="220" height="120" fill="#ffffff" stroke="#f43f5e" stroke-width="3" rx="8"/>
    <text x="110" y="-10" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#f43f5e">eface (any / empty)</text>
    
    <rect x="10" y="20" width="200" height="40" fill="#ffe4e6" stroke="#f43f5e" rx="4"/>
    <text x="20" y="45" font-family="Arial" font-size="12" font-weight="bold">*_type (rtype)</text>
    
    <rect x="10" y="70" width="200" height="40" fill="#ffe4e6" stroke="#f43f5e" rx="4"/>
    <text x="20" y="95" font-family="Arial" font-size="12" font-weight="bold">data (unsafe.Pointer)</text>
  </g>

  <!-- Explanation of itab -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="500" height="150" fill="#f1f5f9" stroke="#94a3b8" rx="10" stroke-dasharray="5,5"/>
    <text x="20" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#475569">Inside itab (Interface Table):</text>
    
    <text x="40" y="60" font-family="Arial" font-size="12" fill="#64748b">1. Interface Type (static type definition)</text>
    <text x="40" y="85" font-family="Arial" font-size="12" fill="#64748b">2. Concrete Type (_type descriptor)</text>
    <text x="40" y="110" font-family="Arial" font-size="12" fill="#64748b">3. Hash (for rapid type switches)</text>
    <text x="40" y="135" font-family="Arial" font-size="12" font-weight="bold" fill="#0ea5e9">4. fun[1] (Function pointers to methods!)</text>
  </g>
</svg>
