<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#f8fafc" rx="10"/>
  
  <!-- Outer Struct (Admin) -->
  <rect x="50" y="50" width="300" height="300" fill="#ffffff" stroke="#00ADD8" stroke-width="3" rx="10"/>
  <text x="200" y="35" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#00ADD8">Outer Struct: ADMIN</text>
  
  <!-- Embedded Struct (User) -->
  <rect x="80" y="150" width="240" height="150" fill="#f1f5f9" stroke="#64748b" stroke-width="2" rx="8" stroke-dasharray="5,5"/>
  <text x="200" y="140" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#64748b">Embedded: USER</text>
  
  <!-- Fields of User -->
  <rect x="100" y="170" width="200" height="30" fill="#ffffff" stroke="#cbd5e1" rx="4"/>
  <text x="110" y="190" font-family="Arial" font-size="12" fill="#334155">Name string</text>
  
  <rect x="100" y="210" width="200" height="30" fill="#ffffff" stroke="#cbd5e1" rx="4"/>
  <text x="110" y="230" font-family="Arial" font-size="12" fill="#334155">Login()</text>

  <!-- Promotion Arrows -->
  <path d="M 320 185 L 450 120" stroke="#00ADD8" stroke-width="3" fill="none" marker-end="url(#bluearrow)"/>
  <text x="460" y="115" font-family="Arial" font-size="14" font-weight="bold" fill="#00ADD8">PROMOTED!</text>
  
  <rect x="440" y="130" width="130" height="60" fill="#e0f2fe" stroke="#00ADD8" rx="8"/>
  <text x="505" y="155" font-family="Arial" font-size="12" text-anchor="middle">admin.Name</text>
  <text x="505" y="175" font-family="Arial" font-size="12" text-anchor="middle">admin.Login()</text>

  <!-- The "Real" Path -->
  <text x="440" y="220" font-family="Arial" font-size="11" fill="#94a3b8">Actually shorthand for:</text>
  <text x="440" y="240" font-family="Arial" font-size="11" font-style="italic" fill="#64748b">admin.User.Name</text>

  <defs>
    <marker id="bluearrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ADD8" />
    </marker>
  </defs>
</svg>
