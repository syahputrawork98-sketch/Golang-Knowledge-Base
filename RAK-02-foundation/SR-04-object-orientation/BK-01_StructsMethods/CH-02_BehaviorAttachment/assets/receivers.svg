<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="300" fill="#f8fafc" rx="10"/>
  
  <!-- Value Receiver -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="220" height="200" fill="#ffffff" stroke="#00ADD8" stroke-width="3" rx="8"/>
    <text x="110" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#00ADD8">VALUE RECEIVER</text>
    
    <rect x="20" y="50" width="180" height="40" fill="#e0f2fe" stroke="#0ea5e9" rx="4"/>
    <text x="110" y="75" font-family="Arial" font-size="12" text-anchor="middle">func (u User) Update()</text>
    
    <path d="M 110 100 L 110 140" stroke="#0ea5e9" stroke-width="2" marker-end="url(#bluearrow)"/>
    <text x="115" y="125" font-family="Arial" font-size="11" fill="#64748b">COPIES Data</text>
    
    <rect x="40" y="150" width="140" height="30" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="4"/>
    <text x="110" y="170" font-family="Arial" font-size="11" text-anchor="middle" fill="#94a3b8">Internal COPY</text>
  </g>
  
  <!-- Pointer Receiver -->
  <g transform="translate(330, 50)">
    <rect x="0" y="0" width="220" height="200" fill="#ffffff" stroke="#10b981" stroke-width="3" rx="8"/>
    <text x="110" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#10b981">POINTER RECEIVER</text>
    
    <rect x="20" y="50" width="180" height="40" fill="#ecfdf5" stroke="#10b981" rx="4"/>
    <text x="110" y="75" font-family="Arial" font-size="12" text-anchor="middle">func (u *User) Update()</text>
    
    <path d="M 110 100 L 110 140" stroke="#10b981" stroke-width="2" marker-end="url(#greenarrow)"/>
    <text x="115" y="125" font-family="Arial" font-size="11" fill="#64748b">POINTS to Original</text>
    
    <circle cx="110" cy="165" r="15" fill="#fef3c7" stroke="#d97706"/>
    <text x="110" y="170" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#d97706">Shared</text>
  </g>

  <defs>
    <marker id="bluearrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0ea5e9" />
    </marker>
    <marker id="greenarrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981" />
    </marker>
  </defs>
</svg>
