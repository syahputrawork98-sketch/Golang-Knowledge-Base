<svg width="600" height="350" viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="350" fill="#f8fafc" rx="10"/>
  
  <!-- GENERIC SOURCE -->
  <rect x="225" y="20" width="150" height="60" fill="#ffffff" stroke="#6366f1" stroke-width="3" rx="5"/>
  <text x="300" y="55" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#6366f1">Generic Func[T]</text>

  <!-- STRATEGY 1: Monomorphization -->
  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="220" height="180" fill="#ffffff" stroke="#10b981" stroke-width="2" rx="8"/>
    <text x="110" y="30" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#10b981">Monomorphization (C++)</text>
    
    <rect x="20" y="50" width="180" height="30" fill="#dcfce7" rx="3"/>
    <text x="110" y="70" font-family="Arial" font-size="11" text-anchor="middle">Func_int()</text>
    
    <rect x="20" y="90" width="180" height="30" fill="#dcfce7" rx="3"/>
    <text x="110" y="110" font-family="Arial" font-size="11" text-anchor="middle">Func_float64()</text>
    
    <rect x="20" y="130" width="180" height="30" fill="#dcfce7" rx="3"/>
    <text x="110" y="150" font-family="Arial" font-size="11" text-anchor="middle">Func_string()</text>
    
    <text x="110" y="205" font-family="Arial" font-size="10" text-anchor="middle" fill="#047857">Fast execution, Large binary size</text>
  </g>

  <!-- STRATEGY 2: GCShape Stenciling -->
  <g transform="translate(330, 120)">
    <rect x="0" y="0" width="220" height="180" fill="#ffffff" stroke="#f59e0b" stroke-width="2" rx="8"/>
    <text x="110" y="30" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#b45309">GCShape Stenciling (Go)</text>
    
    <rect x="20" y="50" width="180" height="50" fill="#fef3c7" rx="3"/>
    <text x="110" y="70" font-family="Arial" font-size="11" text-anchor="middle">Func_GCShape1()</text>
    <text x="110" y="90" font-family="Arial" font-size="9" text-anchor="middle" fill="#92400e">(Shared by all pointers)</text>
    
    <rect x="20" y="110" width="180" height="30" fill="#fef3c7" rx="3"/>
    <text x="110" y="130" font-family="Arial" font-size="11" text-anchor="middle">Dictionary (Type Info)</text>
    
    <text x="110" y="205" font-family="Arial" font-size="10" text-anchor="middle" fill="#92400e">Balanced speed, Small binary size</text>
  </g>

  <!-- Arrows -->
  <path d="M 300 80 L 160 115" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 300 80 L 440 115" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
  </defs>
</svg>
