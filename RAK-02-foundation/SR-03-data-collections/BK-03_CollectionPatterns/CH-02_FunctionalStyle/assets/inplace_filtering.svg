<svg width="650" height="300" viewBox="0 0 650 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="650" height="300" fill="#f0f9ff" rx="10"/>
  
  <!-- Backing Array Base -->
  <rect x="50" y="100" width="500" height="60" fill="#ffffff" stroke="#333" stroke-width="2" rx="5"/>
  <text x="300" y="90" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">In-place Filtering (Two-Pointer Shift)</text>
  
  <!-- Array Elements -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="100" height="60" fill="#dcfce7" stroke="#166534"/>
    <text x="50" y="35" font-family="Arial" font-size="14" text-anchor="middle">KEEP (1)</text>
    
    <rect x="100" y="0" width="100" height="60" fill="#fee2e2" stroke="#991b1b"/>
    <text x="150" y="35" font-family="Arial" font-size="14" text-anchor="middle">DROP (2)</text>
    
    <rect x="200" y="0" width="100" height="60" fill="#dcfce7" stroke="#166534"/>
    <text x="250" y="35" font-family="Arial" font-size="14" text-anchor="middle">KEEP (3)</text>
    
    <rect x="300" y="0" width="100" height="60" fill="#fee2e2" stroke="#991b1b"/>
    <text x="350" y="35" font-family="Arial" font-size="14" text-anchor="middle">DROP (4)</text>
    
    <rect x="400" y="0" width="100" height="60" fill="#dcfce7" stroke="#166534"/>
    <text x="450" y="35" font-family="Arial" font-size="14" text-anchor="middle">KEEP (5)</text>
  </g>
  
  <!-- Movement Arrows -->
  <path d="M 300 180 L 200 180" stroke="#166534" stroke-width="4" marker-end="url(#greenarrow)"/>
  <text x="250" y="210" font-family="Arial" font-size="12" font-weight="bold" fill="#166534" text-anchor="middle">Shift Left (Keep-3 to Slot-2)</text>
  
  <path d="M 500 180 L 280 180" stroke="#166534" stroke-width="4" marker-end="url(#greenarrow)"/>
  <text x="390" y="210" font-family="Arial" font-size="12" font-weight="bold" fill="#166534" text-anchor="middle">Shift Left (Keep-5 to Slot-3)</text>

  <!-- Final Header -->
  <rect x="50" y="240" width="300" height="40" fill="none" stroke="#2563eb" stroke-width="4" stroke-dasharray="8,4" rx="5"/>
  <text x="420" y="265" font-family="Arial" font-size="14" font-weight="bold" fill="#2563eb">Result Header (Len: 3)</text>
  <text x="200" y="265" font-family="Arial" font-size="14" font-weight="bold" fill="#2563eb">NEW VIEW</text>

  <defs>
    <marker id="greenarrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
    </marker>
  </defs>
</svg>
