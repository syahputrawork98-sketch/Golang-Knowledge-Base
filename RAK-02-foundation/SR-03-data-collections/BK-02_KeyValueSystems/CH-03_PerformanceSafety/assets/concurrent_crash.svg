<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="300" fill="#fff5f5" rx="10"/>
  
  <!-- Shared Map -->
  <rect x="225" y="100" width="150" height="100" fill="#ffffff" stroke="#333" stroke-width="3" rx="10"/>
  <text x="300" y="155" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">SHARED MAP</text>
  
  <!-- Goroutine 1 -->
  <g transform="translate(50, 100)">
    <circle cx="50" cy="50" r="40" fill="#00ADD8"/>
    <text x="50" y="55" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">G1</text>
    <path d="M 90 50 L 160 50" stroke="#00ADD8" stroke-width="4" marker-end="url(#bluearrow)"/>
    <text x="125" y="40" font-family="Arial" font-size="12" font-weight="bold" fill="#0088aa">WRITE</text>
  </g>
  
  <!-- Goroutine 2 -->
  <g transform="translate(450, 100)">
    <circle cx="50" cy="50" r="40" fill="#f59e0b"/>
    <text x="50" y="55" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">G2</text>
    <path d="M 10 50 L -60 50" stroke="#f59e0b" stroke-width="4" marker-end="url(#orangearrow)"/>
    <text x="-25" y="40" font-family="Arial" font-size="12" font-weight="bold" fill="#d97706">WRITE</text>
  </g>
  
  <!-- CRASH! -->
  <path d="M 300 150 L 300 250" stroke="#dc2626" stroke-width="5" stroke-dasharray="5,3"/>
  <polygon points="300,180 340,220 300,260 260,220" fill="#dc2626"/>
  <text x="300" y="225" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#fff">PANIC!</text>
  <text x="300" y="285" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#991b1b">fatal error: concurrent map writes</text>
  
  <defs>
    <marker id="bluearrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ADD8" />
    </marker>
    <marker id="orangearrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>
</svg>
