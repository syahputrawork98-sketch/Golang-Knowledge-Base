<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#f3f4f6" rx="10"/>
  
  <!-- hmap struct -->
  <rect x="40" y="40" width="150" height="120" fill="#ffffff" stroke="#6366f1" stroke-width="3" rx="8"/>
  <text x="115" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#6366f1">hmap (Header)</text>
  <text x="50" y="70" font-family="Arial" font-size="12" fill="#4b5563">count: int</text>
  <text x="50" y="95" font-family="Arial" font-size="12" fill="#4b5563">B: uint8 (2^B buckets)</text>
  <text x="50" y="120" font-family="Arial" font-size="12" font-weight="bold" fill="#4b5563">buckets --> Pointer</text>
  
  <!-- Arrow to Buckets -->
  <path d="M 190 120 L 260 120" stroke="#6366f1" stroke-width="3" fill="none" marker-end="url(#indigoarrow)"/>
  
  <!-- Buckets Array -->
  <g transform="translate(270, 40)">
    <text x="120" y="-10" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Buckets Array (bmap)</text>
    
    <!-- Bucket 0 -->
    <rect x="0" y="0" width="240" height="100" fill="#ffffff" stroke="#4f46e5" rx="5"/>
    <text x="10" y="20" font-family="Arial" font-size="12" font-weight="bold">Bucket Index 0</text>
    <!-- TopHash -->
    <rect x="10" y="30" width="220" height="15" fill="#e0e7ff" stroke="#a5b4fc"/>
    <text x="120" y="42" font-family="Arial" font-size="10" text-anchor="middle">TopHash (8 slots)</text>
    <!-- Keys & Values -->
    <rect x="10" y="50" width="105" height="40" fill="#fef3c7" stroke="#fbbf24"/>
    <text x="62" y="75" font-family="Arial" font-size="11" text-anchor="middle">8 Keys</text>
    <rect x="125" y="50" width="105" height="40" fill="#dcfce7" stroke="#4ade80"/>
    <text x="177" y="75" font-family="Arial" font-size="11" text-anchor="middle">8 Values</text>
    
    <!-- Bucket 1 -->
    <rect x="0" y="120" width="240" height="100" fill="#ffffff" stroke="#4f46e5" rx="5" opacity="0.6"/>
    <text x="10" y="140" font-family="Arial" font-size="12" font-weight="bold" opacity="0.6">Bucket Index 1</text>
    
    <!-- Overflow -->
    <path d="M 240 50 L 280 50 L 280 250 L 240 250" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#redarrow)"/>
    <text x="285" y="150" font-family="Arial" font-size="12" fill="#ef4444" writing-mode="tb">OVERFLOW</text>
  </g>

  <defs>
    <marker id="indigoarrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1" />
    </marker>
    <marker id="redarrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444" />
    </marker>
  </defs>
</svg>
