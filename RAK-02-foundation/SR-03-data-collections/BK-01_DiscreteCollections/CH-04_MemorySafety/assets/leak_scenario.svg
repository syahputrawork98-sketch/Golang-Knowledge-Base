<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="300" fill="#fffde7" rx="10"/>
  
  <!-- Giant Backing Array -->
  <rect x="50" y="80" width="500" height="60" fill="#eeeeee" stroke="#bdbdbd" stroke-width="2" rx="5"/>
  <text x="300" y="70" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#757575">GIANT BACKING ARRAY (e.g., 100MB)</text>
  <text x="300" y="115" font-family="Arial" font-size="12" text-anchor="middle" fill="#9e9e9e">[ ... 1,000,000 elements ... ]</text>
  
  <!-- Small Slice -->
  <rect x="50" y="80" width="60" height="60" fill="#ffcdd2" stroke="#c62828" stroke-width="3" rx="2"/>
  <text x="35" y="170" font-family="Arial" font-size="14" font-weight="bold" fill="#c62828">Sub-Slice (3 items)</text>
  
  <!-- GC Shield -->
  <path d="M 120 180 Q 300 160 480 180" stroke="#f44336" stroke-width="4" fill="none" stroke-dasharray="10,5"/>
  <circle cx="300" cy="220" r="40" fill="#f44336"/>
  <text x="300" y="225" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#fff">GC</text>
  <text x="300" y="275" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#d32f2f">CANNOT FREE THE GIANT ARRAY!</text>
  
  <!-- Danger Arrow -->
  <path d="M 80 175 L 80 145" stroke="#c62828" stroke-width="2" fill="none" marker-end="url(#redarrow)"/>
  <text x="430" y="170" font-family="Arial" font-size="12" fill="#555">Still reachable via Small Slice Pointer</text>

  <defs>
    <marker id="redarrow" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c62828" />
    </marker>
  </defs>
</svg>
