<svg width="650" height="350" viewBox="0 0 650 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="650" height="350" fill="#fcfcfc" rx="10"/>
  
  <!-- Step 1: Before -->
  <text x="50" y="40" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Step 1: Cap Full (Len: 2, Cap: 2)</text>
  <rect x="50" y="60" width="120" height="40" fill="#ffebee" stroke="#c62828" stroke-width="2" rx="4"/>
  <text x="110" y="85" font-family="Arial" font-size="14" text-anchor="middle" fill="#c62828">[ 10 | 20 ]</text>
  
  <!-- Arrow -->
  <path d="M 180 80 L 250 80" stroke="#999" stroke-width="2" fill="none" marker-end="url(#grayarrow)"/>
  
  <!-- Step 2: Reallocate -->
  <text x="280" y="40" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Step 2: Allocate &amp; Copy (2x Cap)</text>
  <rect x="280" y="60" width="120" height="40" fill="#f5f5f5" stroke="#999" stroke-dasharray="4" rx="4" opacity="0.5"/>
  <text x="340" y="85" font-family="Arial" font-size="14" text-anchor="middle" fill="#999" opacity="0.5">[ 10 | 20 ]</text>
  
  <path d="M 340 105 L 340 145" stroke="#00ADD8" stroke-width="3" fill="none" marker-end="url(#bluearrow)"/>
  <text x="440" y="130" font-family="Arial" font-size="13" fill="#00ADD8">runtime.growslice()</text>

  <rect x="280" y="160" width="240" height="40" fill="#e3f2fd" stroke="#00ADD8" stroke-width="2" rx="4"/>
  <text x="340" y="185" font-family="Arial" font-size="14" text-anchor="middle" fill="#1976d2">[ 10 | 20 ]</text>
  <text x="400" y="185" font-family="Arial" font-size="14" text-anchor="middle" fill="#bbb">| _ | _ ]</text>
  <text x="400" y="220" font-family="Arial" font-size="12" text-anchor="middle" fill="#555">New Capacity: 4</text>

  <!-- Step 3: Result -->
  <text x="50" y="270" font-family="Arial" font-size="16" font-weight="bold" fill="#2e7d32">Step 3: Append Successful</text>
  <rect x="50" y="290" width="240" height="40" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" rx="4"/>
  <text x="170" y="315" font-family="Arial" font-size="14" text-anchor="middle" fill="#1b5e20">[ 10 | 20 | 30 ]</text>
  <text x="235" y="315" font-family="Arial" font-size="14" text-anchor="middle" fill="#bbb">| _ ]</text>
  <text x="400" y="315" font-family="Arial" font-size="12" fill="#555">New Header Points to New Array Address</text>

  <defs>
    <marker id="grayarrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999" />
    </marker>
    <marker id="bluearrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ADD8" />
    </marker>
  </defs>
</svg>
