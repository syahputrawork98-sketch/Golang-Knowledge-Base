<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#f8fafc" rx="10"/>
  
  <!-- ROOT CONTEXT -->
  <g transform="translate(250, 40)">
    <rect x="0" y="0" width="120" height="50" fill="#1e293b" stroke="#0ea5e9" stroke-width="2" rx="5"/>
    <text x="60" y="30" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">Context.Background()</text>
  </g>

  <!-- CHILD 1: WITH TIMEOUT -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="140" height="60" fill="#ffffff" stroke="#f59e0b" stroke-width="2" rx="5"/>
    <text x="70" y="25" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="#b45309">ctxWithTimeout</text>
    <text x="70" y="45" font-family="Arial" font-size="9" text-anchor="middle" fill="#d97706">(2 Seconds)</text>
    
    <!-- Link from Root -->
    <path d="M 170 -60 Q 150 -60 70 0" fill="none" stroke="#94a3b8" stroke-width="2" transform="translate(0, 0)"/>
  </g>

  <!-- CHILD 2: WITH CANCEL -->
  <g transform="translate(360, 150)">
    <rect x="0" y="0" width="140" height="60" fill="#ffffff" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="70" y="25" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="#991b1b">ctxWithCancel</text>
    <text x="70" y="45" font-family="Arial" font-size="9" text-anchor="middle" fill="#ef4444">(Manual Cancel)</text>
    
    <!-- Link from Root -->
    <path d="M -50 -60 Q -30 -60 70 0" fill="none" stroke="#94a3b8" stroke-width="2" transform="translate(0, 0)"/>
  </g>

  <!-- PROPAGATION ARROWS -->
  <path d="M 310 90 L 310 330" stroke="#ef4444" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowRed)"/>
  <text x="320" y="250" font-family="Arial" font-size="12" font-weight="bold" fill="#ef4444">CANCEL SIGNAL</text>

  <!-- LEAF GOROUTINES -->
  <g transform="translate(50, 280)">
    <circle cx="50" cy="50" r="20" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="50" y="55" font-family="Arial" font-size="10" text-anchor="middle">G1</text>
    
    <circle cx="120" cy="50" r="20" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="120" y="55" font-family="Arial" font-size="10" text-anchor="middle" fill="#ef4444">Abort!</text>
    
    <path d="M 120 -70 L 120 -10" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  </g>

  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="9" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
  </defs>

  <text x="300" y="385" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e293b">CONTEXT TREE: "Cancellation cascades downwards"</text>
</svg>
