<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="300" fill="#f8fafc" rx="10"/>
  
  <!-- WAITGROUP BOX -->
  <g transform="translate(200, 50)">
    <rect x="0" y="0" width="200" height="150" fill="#ffffff" stroke="#6366f1" stroke-width="3" rx="10"/>
    <text x="100" y="-10" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#6366f1">sync.WaitGroup</text>
    
    <!-- INTERNAL COUNTER -->
    <rect x="25" y="40" width="150" height="80" fill="#e0e7ff" rx="5"/>
    <text x="100" y="65" font-family="Arial" font-size="12" text-anchor="middle" fill="#4338ca">Internal Counter</text>
    <text x="100" y="105" font-family="Arial" font-size="32" font-weight="bold" text-anchor="middle" fill="#6366f1">0</text>
  </g>

  <!-- METHODS -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="100" height="40" fill="#dcfce7" stroke="#10b981" rx="5"/>
    <text x="50" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#047857">Add(n)</text>
    <path d="M 110 20 L 190 60" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  </g>

  <g transform="translate(50, 140)">
    <rect x="0" y="0" width="100" height="40" fill="#fee2e2" stroke="#ef4444" rx="5"/>
    <text x="50" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#991b1b">Done()</text>
    <path d="M 110 160 L 190 140" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  </g>

  <!-- WAIT STATE -->
  <g transform="translate(450, 100)">
    <rect x="0" y="0" width="100" height="60" fill="#fef3c7" stroke="#f59e0b" rx="5"/>
    <text x="50" y="30" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#b45309">Wait()</text>
    <text x="50" y="50" font-family="Arial" font-size="9" text-anchor="middle" fill="#92400e">(Blocks until 0)</text>
    <path d="M 400 130 L 450 130" stroke="#f59e0b" stroke-width="2" marker-start="url(#dot)"/>
  </g>

  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
    <marker id="dot" markerWidth="10" markerHeight="10" refX="5" refY="5">
      <circle cx="5" cy="5" r="3" fill="#f59e0b" />
    </marker>
  </defs>

  <text x="300" y="280" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e293b">SYNC ORCHESTRATION: "Wait for all counters to hit zero"</text>
</svg>
