<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f4f7f6" rx="10"/>
  
  <text x="400" y="40" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#2c3e50">Recovery: The Circuit Breaker Pattern</text>

  <!-- Root Context -->
  <rect x="50" y="80" width="700" height="340" fill="#fff" stroke="#2c3e50" stroke-width="2" rx="10"/>
  <text x="70" y="110" font-family="Arial" font-size="16" font-weight="bold" fill="#2c3e50">Main Application Process</text>

  <!-- Worker 1 (Healthy) -->
  <rect x="100" y="150" width="180" height="200" fill="#e8f5e9" stroke="#28a745" rx="10"/>
  <text x="190" y="180" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#28a745">Worker 1</text>
  <circle cx="190" cy="250" r="30" fill="#28a745"/>
  <text x="190" y="320" text-anchor="middle" font-family="Arial" font-size="12" fill="#28a745">Running OK</text>

  <!-- Worker 2 (Panic & Recover) -->
  <rect x="310" y="150" width="180" height="200" fill="#fdf2f2" stroke="#dc3545" rx="10"/>
  <text x="400" y="180" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#dc3545">Worker 2</text>
  
  <!-- The Panic Point -->
  <path d="M380 230 L420 270 M380 270 L420 230" stroke="#dc3545" stroke-width="8"/>
  <text x="400" y="300" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#dc3545">PANIC!</text>

  <!-- The Recovery Shield -->
  <circle cx="400" cy="250" r="60" fill="none" stroke="#28a745" stroke-width="4" stroke-dasharray="10,5"/>
  <text x="400" y="340" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#28a745">RECOVERED</text>

  <!-- Worker 3 (Healthy) -->
  <rect x="520" y="150" width="180" height="200" fill="#e8f5e9" stroke="#28a745" rx="10"/>
  <text x="610" y="180" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#28a745">Worker 3</text>
  <circle cx="610" cy="250" r="30" fill="#28a745"/>
  <text x="610" y="320" text-anchor="middle" font-family="Arial" font-size="12" fill="#28a745">Running OK</text>

  <!-- Connection to Main -->
  <path d="M400 350 L400 400" stroke="#28a745" stroke-width="4" marker-end="url(#tick)"/>
  <text x="415" y="405" font-family="Arial" font-size="12" fill="#28a745">System stays alive</text>

  <defs>
    <marker id="tick" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M2,5 L5,8 L8,2" fill="none" stroke="#28a745" stroke-width="2"/>
    </marker>
  </defs>
</svg>
