<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#f8fafc" rx="10"/>
  
  <!-- UNBUFFERED (Pipe) -->
  <g transform="translate(50, 50)">
    <text x="0" y="-10" font-family="Arial" font-size="14" font-weight="bold" fill="#6366f1">Unbuffered (Synchrous Pipe)</text>
    <rect x="0" y="0" width="220" height="120" fill="#ffffff" stroke="#6366f1" stroke-width="2" rx="5"/>
    
    <!-- Sender -->
    <circle cx="40" cy="60" r="15" fill="#fca5a5" stroke="#ef4444"/>
    <text x="40" y="100" font-family="Arial" font-size="10" text-anchor="middle">Sender</text>
    
    <!-- Receiver -->
    <circle cx="180" cy="60" r="15" fill="#cbd5e1" stroke="#475569"/>
    <text x="180" y="100" font-family="Arial" font-size="10" text-anchor="middle">Receiver</text>

    <!-- Handshake -->
    <path d="M 60 60 L 160 60" stroke="#6366f1" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowBlue)"/>
    <text x="110" y="50" font-family="Arial" font-size="9" text-anchor="middle" fill="#6366f1">SYNC BLOCK</text>
  </g>

  <!-- BUFFERED (Warehouse) -->
  <g transform="translate(330, 50)">
    <text x="0" y="-10" font-family="Arial" font-size="14" font-weight="bold" fill="#10b981">Buffered (Async Warehouse)</text>
    <rect x="0" y="0" width="220" height="120" fill="#ffffff" stroke="#10b981" stroke-width="2" rx="5"/>
    
    <!-- Buffer Slots -->
    <rect x="70" y="40" width="25" height="40" fill="#dcfce7" stroke="#10b981"/>
    <rect x="100" y="40" width="25" height="40" fill="#dcfce7" stroke="#10b981"/>
    <rect x="130" y="40" width="25" height="40" fill="#dcfce7" stroke="#10b981"/>
    
    <circle cx="35" cy="60" r="15" fill="#fca5a5" stroke="#ef4444"/>
    <circle cx="185" cy="60" r="15" fill="#cbd5e1" stroke="#475569"/>
    
    <text x="110" y="105" font-family="Arial" font-size="9" text-anchor="middle" fill="#047857">CAPACITY: 3</text>
  </g>

  <!-- INTERNAL hchan -->
  <g transform="translate(50, 210)">
    <rect x="0" y="0" width="500" height="150" fill="#f1f5f9" stroke="#94a3b8" rx="10" stroke-dasharray="8,4"/>
    <text x="20" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#475569">Inside hchan (Channel Runtime):</text>
    
    <text x="40" y="60" font-family="Arial" font-size="11" fill="#64748b">1. buf: Circular Buffer (only for buffered channels)</text>
    <text x="40" y="85" font-family="Arial" font-size="11" fill="#64748b">2. lock: Mutex for thread safety</text>
    <text x="40" y="110" font-family="Arial" font-size="11" fill="#64748b">3. sendq/recvq: Waiting goroutine queues (Sudog pointers)</text>
    <text x="40" y="135" font-family="Arial" font-size="11" font-weight="bold" fill="#0ea5e9">Result: Atomic communication without explicit locks in your code.</text>
  </g>

  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orientation="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6366f1" />
    </marker>
  </defs>
</svg>
