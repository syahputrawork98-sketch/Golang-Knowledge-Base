<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  
  <!-- Global Queue -->
  <rect x="200" y="20" width="200" height="40" rx="5" fill="#dfe4ea" stroke="#ced4da"/>
  <text x="240" y="45" font-family="Arial" font-size="14" font-weight="bold">Global Run Queue</text>
  
  <!-- P: Processor -->
  <rect x="150" y="100" width="300" height="60" rx="5" fill="#ffa502" stroke="#eccc68"/>
  <text x="260" y="135" font-family="Arial" font-size="18" font-weight="bold" fill="white">P (Processor)</text>
  
  <!-- Local Queue -->
  <rect x="160" y="170" width="280" height="30" rx="3" fill="#ffffff" stroke="#ced4da" stroke-dasharray="5,2"/>
  <text x="250" y="190" font-family="Arial" font-size="12" fill="#747d8c">Local Run Queue (max 256 G)</text>
  
  <!-- M: Machine -->
  <rect x="50" y="250" width="120" height="80" rx="10" fill="#2f3542" stroke="#2f3542"/>
  <text x="85" y="295" font-family="Arial" font-size="18" font-weight="bold" fill="white">M</text>
  <text x="70" y="320" font-family="Arial" font-size="10" fill="white">(OS Thread)</text>
  
  <!-- G: Goroutine -->
  <circle cx="300" cy="290" r="40" fill="#7bed9f" stroke="#2ed573" stroke-width="2"/>
  <text x="290" y="295" font-family="Arial" font-size="20" font-weight="bold">G</text>
  
  <!-- Connections -->
  <path d="M 110 250 L 220 160" stroke="#2f3542" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 300 160 L 300 250" stroke="#ffa502" stroke-width="2" marker-end="url(#arrow_orange)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f3542" />
    </marker>
    <marker id="arrow_orange" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffa502" />
    </marker>
  </defs>
  
  <text x="50" y="380" font-family="Arial" font-size="12" font-style="italic" fill="#718093">Visualisasi: Anatomi Model Penjadwalan G-M-P</text>
</svg>
