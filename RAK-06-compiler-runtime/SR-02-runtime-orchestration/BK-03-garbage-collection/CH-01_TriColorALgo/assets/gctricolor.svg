<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f1f2f6"/>
  
  <!-- White: Unreached -->
  <rect x="50" y="100" width="100" height="100" rx="5" fill="#ffffff" stroke="#ced4da" stroke-width="2"/>
  <text x="75" y="155" font-family="Arial" font-size="14" font-weight="bold">White</text>
  <text x="60" y="180" font-family="Arial" font-size="10" fill="#7f8c8d">Candidate for GC</text>
  
  <!-- Grey: Scanning -->
  <rect x="250" y="100" width="100" height="100" rx="5" fill="#dfe4ea" stroke="#ced4da" stroke-width="2"/>
  <text x="280" y="155" font-family="Arial" font-size="14" font-weight="bold">Grey</text>
  <text x="260" y="180" font-family="Arial" font-size="10" fill="#7f8c8d">Reached, Queued</text>
  
  <!-- Black: Reachable -->
  <rect x="450" y="100" width="100" height="100" rx="5" fill="#2f3542" stroke="#2f3542" stroke-width="2"/>
  <text x="480" y="155" font-family="Arial" font-size="14" font-weight="bold" fill="white">Black</text>
  <text x="465" y="180" font-family="Arial" font-size="10" fill="#a4b0be">Confirmed Live</text>
  
  <!-- Transitions -->
  <path d="M 150 150 L 240 150" stroke="#718093" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 350 150 L 440 150" stroke="#718093" stroke-width="3" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#718093" />
    </marker>
  </defs>
  
  <text x="50" y="270" font-family="Arial" font-size="12" font-style="italic" fill="#57606f">Visualisasi: Status Object dalam Algoritma Tri-color GC</text>
</svg>
