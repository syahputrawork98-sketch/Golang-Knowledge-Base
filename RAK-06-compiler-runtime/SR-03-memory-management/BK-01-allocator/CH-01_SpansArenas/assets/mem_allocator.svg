<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <!-- MHeap -->
  <rect x="150" y="50" width="300" height="80" rx="5" fill="#0097e6" stroke="#0086cc"/>
  <text x="250" y="95" font-family="Arial" font-size="20" font-weight="bold" fill="white">MHeap (Global)</text>
  
  <!-- MCentral -->
  <rect x="100" y="180" width="400" height="60" rx="5" fill="#44bd32" stroke="#3eac2d"/>
  <text x="220" y="215" font-family="Arial" font-size="18" font-weight="bold" fill="white">MCentral (per SizeClass)</text>
  
  <!-- MCache -->
  <rect x="50" y="300" width="150" height="60" rx="5" fill="#e1b12c" stroke="#cc9f27"/>
  <text x="75" y="335" font-family="Arial" font-size="16" font-weight="bold" fill="white">MCache (P1)</text>
  
  <rect x="400" y="300" width="150" height="60" rx="5" fill="#e1b12c" stroke="#cc9f27"/>
  <text x="425" y="335" font-family="Arial" font-size="16" font-weight="bold" fill="white">MCache (P2)</text>
  
  <!-- Paths -->
  <path d="M 300 130 L 300 180" stroke="#2f3542" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 200 240 L 125 300" stroke="#2f3542" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 400 240 L 475 300" stroke="#2f3542" stroke-width="2" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f3542" />
    </marker>
  </defs>
  
  <text x="50" y="380" font-family="Arial" font-size="12" font-style="italic" fill="#7f8c8d">Visualisasi: Hirarki Alokator Memori (TCMalloc)</text>
</svg>
