<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <!-- Client -->
  <rect x="20" y="150" width="120" height="100" rx="10" fill="#2f3542" stroke="#2f3542"/>
  <text x="55" y="205" font-family="Arial" font-size="16" fill="white" font-weight="bold">Client</text>
  
  <!-- Request Arrow -->
  <path d="M 140 180 L 350 180" stroke="#1e90ff" stroke-width="3" fill="none" marker-end="url(#blue_arrow)"/>
  <text x="180" y="170" font-family="Arial" font-size="12" fill="#1e90ff">HTTP Request (GET/POST)</text>
  
  <!-- Server -->
  <rect x="360" y="50" width="220" height="300" rx="10" fill="#dfe4ea" stroke="#ced4da" stroke-width="2"/>
  <text x="430" y="40" font-family="Arial" font-size="16" font-weight="bold">HTTP Server</text>
  
  <!-- Mux -->
  <rect x="380" y="80" width="180" height="60" rx="5" fill="#ffa502" stroke="#eccc68"/>
  <text x="420" y="115" font-family="Arial" font-size="14" font-weight="bold">ServeMux</text>
  
  <!-- Handlers -->
  <rect x="380" y="200" width="180" height="120" rx="5" fill="#7bed9f" stroke="#2ed573"/>
  <text x="430" y="265" font-family="Arial" font-size="14" font-weight="bold">Handlers</text>
  
  <!-- Response Arrow -->
  <path d="M 350 250 L 140 250" stroke="#2ed573" stroke-width="3" fill="none" marker-end="url(#green_arrow)"/>
  <text x="180" y="240" font-family="Arial" font-size="12" fill="#2ed573">HTTP Response (200 OK)</text>
  
  <defs>
    <marker id="blue_arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e90ff" />
    </marker>
    <marker id="green_arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ed573" />
    </marker>
  </defs>
  
  <text x="50" y="380" font-family="Arial" font-size="12" font-style="italic" fill="#7f8c8d">Visualisasi: Siklus HTTP Request / Response</text>
</svg>
