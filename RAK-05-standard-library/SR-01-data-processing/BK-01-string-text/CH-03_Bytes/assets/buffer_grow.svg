<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  
  <!-- Slice View -->
  <rect x="50" y="50" width="300" height="40" fill="#ced4da" stroke="#adb5bd"/>
  <rect x="50" y="50" width="180" height="40" fill="#7bed9f" stroke="#2ed573"/>
  <text x="50" y="40" font-family="Arial" font-size="12" font-weight="bold">Initial Capacity: 16b</text>
  <text x="60" y="75" font-family="Arial" font-size="12">Data (len: 10)</text>
  
  <!-- Grow Arrow -->
  <path d="M 200 100 L 200 160" stroke="#ff4757" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="130" font-family="Arial" font-size="12" fill="#ff4757">Grow(n)</text>
  
  <!-- Expanded View -->
  <rect x="50" y="180" width="500" height="40" fill="#ced4da" stroke="#adb5bd"/>
  <rect x="50" y="180" width="350" height="40" fill="#1e90ff" stroke="#2f3542"/>
  <text x="50" y="170" font-family="Arial" font-size="12" font-weight="bold">Expanded Capacity: 2*cap + n</text>
  <text x="60" y="205" font-family="Arial" font-size="12" fill="white">Migrated Data (len: 25)</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4757" />
    </marker>
  </defs>
  
  <text x="50" y="270" font-family="Arial" font-size="12" font-style="italic" fill="#7f8c8d">Visualisasi: Mekanisme Pertumbuhan bytes.Buffer</text>
</svg>
