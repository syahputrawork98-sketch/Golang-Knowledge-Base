<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  
  <!-- Source -->
  <rect x="30" y="100" width="120" height="80" rx="5" fill="#353b48" stroke="#2f3640"/>
  <text x="50" y="145" font-family="Arial" font-size="14" fill="white" font-weight="bold">Source File</text>
  
  <!-- Reader -->
  <path d="M 150 140 L 220 140" stroke="#44bd32" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <text x="160" y="130" font-family="Arial" font-size="12" fill="#44bd32">io.Reader</text>
  
  <!-- Buffer -->
  <rect x="230" y="110" width="140" height="60" rx="5" fill="#fbc531" stroke="#e1b12c"/>
  <text x="260" y="145" font-family="Arial" font-size="14" font-weight="bold">p []byte</text>
  
  <!-- Writer -->
  <path d="M 370 140 L 440 140" stroke="#44bd32" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <text x="380" y="130" font-family="Arial" font-size="12" fill="#44bd32">io.Writer</text>
  
  <!-- Destination -->
  <rect x="450" y="100" width="120" height="80" rx="5" fill="#487eb0" stroke="#40739e"/>
  <text x="470" y="145" font-family="Arial" font-size="14" fill="white" font-weight="bold">Network / Console</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#44bd32" />
    </marker>
  </defs>
  
  <text x="50" y="270" font-family="Arial" font-size="12" font-style="italic" fill="#718093">Visualisasi: Aliran Data io.Reader dan io.Writer</text>
</svg>
