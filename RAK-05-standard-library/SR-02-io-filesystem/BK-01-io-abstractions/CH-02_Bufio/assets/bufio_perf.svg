<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <!-- Direct IO -->
  <g transform="translate(50, 50)">
    <text x="0" y="0" font-family="Arial" font-size="14" font-weight="bold">Direct IO (Expensive)</text>
    <rect x="0" y="20" width="80" height="30" fill="#ff4757" rx="5"/>
    <text x="150" y="40" font-family="Arial" font-size="12">100 Syscalls (1 byte each)</text>
    <path d="M 80 35 L 140 35" stroke="#ff4757" stroke-width="2" marker-end="url(#arrow_red)"/>
  </g>
  
  <!-- Buffered IO -->
  <g transform="translate(50, 150)">
    <text x="0" y="0" font-family="Arial" font-size="14" font-weight="bold">Buffered IO (Optimized)</text>
    <rect x="0" y="20" width="80" height="30" fill="#2ed573" rx="5"/>
    <rect x="100" y="20" width="150" height="30" fill="#7bed9f" rx="3" stroke="#2ed573" stroke-dasharray="5,2"/>
    <text x="270" y="40" font-family="Arial" font-size="12">1 Syscall (Reads 4KB into Buffer)</text>
    <path d="M 80 35 L 95 35" stroke="#2ed573" stroke-width="2"/>
    <path d="M 250 35 L 265 35" stroke="#2ed573" stroke-width="2" marker-end="url(#arrow_green)"/>
  </g>
  
  <defs>
    <marker id="arrow_red" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4757" />
    </marker>
    <marker id="arrow_green" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ed573" />
    </marker>
  </defs>
  
  <text x="50" y="270" font-family="Arial" font-size="12" font-style="italic" fill="#7f8c8d">Visualisasi: Mengapa Bufio Lebih Cepat?</text>
</svg>
