<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f1f2f6"/>
  
  <!-- Clock -->
  <circle cx="80" cy="150" r="50" fill="#2f3542" stroke="#2f3542" stroke-width="2"/>
  <path d="M 80 150 L 80 110" stroke="white" stroke-width="3"/>
  <path d="M 80 150 L 110 150" stroke="white" stroke-width="2"/>
  <text x="55" y="220" font-family="Arial" font-size="14" font-weight="bold">System Clock</text>
  
  <!-- Ticker Runtime -->
  <rect x="230" y="80" width="140" height="140" rx="10" fill="#ffa502" stroke="#eccc68"/>
  <text x="250" y="150" font-family="Arial" font-size="16" font-weight="bold">time.Ticker</text>
  
  <!-- Channel Send -->
  <path d="M 370 150 L 440 150" stroke="#1e90ff" stroke-width="3" marker-end="url(#blue_arrow)"/>
  <text x="380" y="140" font-family="Arial" font-size="12" fill="#1e90ff">ticker.C (Chan)</text>
  
  <!-- Goroutine Receive -->
  <rect x="450" y="100" width="120" height="100" rx="40" fill="#7bed9f" stroke="#2ed573"/>
  <text x="470" y="155" font-family="Arial" font-size="14" font-weight="bold">Goroutine</text>
  
  <defs>
    <marker id="blue_arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e90ff" />
    </marker>
  </defs>
  
  <text x="50" y="270" font-family="Arial" font-size="12" font-style="italic" fill="#7f8c8d">Visualisasi: Alur Kerja time.Ticker & Channel</text>
</svg>
